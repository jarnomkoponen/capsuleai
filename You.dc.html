<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { margin: 0; }
  .yo-scroll::-webkit-scrollbar { width: 0; }
  .yo-action:focus-visible { outline: 2px solid #0F766E; outline-offset: 2px; }
.cap-fakestatus{display:none !important;}
  .cap-stage{min-height:100dvh !important;padding:0 !important;align-items:stretch !important;}
  .cap-phone{width:100% !important;max-width:480px !important;height:100vh !important;height:100dvh !important;border-radius:0 !important;border:none !important;padding-top:env(safe-area-inset-top,0) !important;}
</style><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
</helmet>
<div class="cap-stage" style="min-height:100vh;background:#ECECEE;display:flex;align-items:center;justify-content:center;padding:24px 12px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI',system-ui,sans-serif;">
  <div class="cap-phone" style="width:390px;max-width:100%;height:812px;background:#FFFFFF;border-radius:44px;border:1px solid #D9D9DD;overflow:hidden;display:flex;flex-direction:column;">
    <div class="cap-fakestatus" style="display:flex;align-items:center;justify-content:space-between;padding:12px 26px 4px;flex:none;">
      <span style="font-size:15px;font-weight:600;color:#17171A;">9:41</span>
      <span aria-hidden="true" style="display:flex;gap:6px;align-items:center;"><svg width="18" height="12" viewBox="0 0 18 12" fill="#17171A"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg><svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 10.4a1.15 1.15 0 100-2.3 1.15 1.15 0 000 2.3z" fill="#17171A"/><path d="M3.6 6.4a6.2 6.2 0 018.8 0M1.2 4a9.7 9.7 0 0113.6 0" stroke="#17171A" stroke-width="1.4" stroke-linecap="round"/></svg><svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="0.6" y="0.6" width="22" height="11.8" rx="3" stroke="#17171A" stroke-width="1.2"/><rect x="2.6" y="2.6" width="14.5" height="7.8" rx="1.5" fill="#17171A"/><path d="M24.4 4.3c1 .5 1 3.9 0 4.4" stroke="#17171A" stroke-width="1.4" stroke-linecap="round"/></svg></span>
    </div>
    <dc-import name="TopNavModule" variant="home" title="You" unread="2" on-bell="{{ onBell }}" on-chat="{{ onChat }}" hint-size="100%,60px"></dc-import>
    <main role="main" class="yo-scroll" style="flex:1;min-height:0;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:28px;">
      <dc-import name="ConnectedAppsModule" on-add="{{ onManageAccess }}" hint-size="100%,380px"></dc-import>
      <div style="display:flex;flex-direction:column;gap:12px;padding-top:8px;border-top:1px solid #ECECEE;">
        <button type="button" onClick="{{ onLogOut }}" class="yo-action" style="appearance:none;border:1px solid #17171A;background:#FFFFFF;color:#17171A;font:600 16px/1 inherit;min-height:48px;border-radius:12px;cursor:pointer;width:100%;">Log out</button>
        <button type="button" onClick="{{ onDeleteAccount }}" class="yo-action" style="appearance:none;border:1px solid #D9D9DD;background:#FFFFFF;color:#B3261E;font:600 16px/1 inherit;min-height:48px;border-radius:12px;cursor:pointer;width:100%;">Delete account</button>
      </div>
    </main>
    <dc-import name="BottomNavModule" current="You" on-navigate="{{ onNav }}" hint-size="100%,88px"></dc-import>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:880}}">class Component extends DCLogic {
  renderVals() {
    return {
      onManageAccess: this.props.onManageAccess || (() => { try { window.location.href = 'Assistants.dc.html'; } catch (e) {} }),
      onLogOut: this.props.onLogOut || (() => { try { window.location.href = 'SignIn.dc.html'; } catch (e) {} }),
      onDeleteAccount: this.props.onDeleteAccount || (() => { try { window.location.href = 'SignIn.dc.html'; } catch (e) {} }),
    };
  }
}</script>
</body>
</html>
