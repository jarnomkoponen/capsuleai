  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"2755b00e-a4ea-4706-b123-42e68dfa40f3\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>* { box-sizing: border-box; } body { margin: 0; background: #ECECEE; }<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;\">\n  <sc-if value=\"{{ isSignin }}\" hint-placeholder-val=\"{{ false }}\"><dc-import name=\"SignIn\" on-next=\"{{ toOnboarding }}\" hint-size=\"100%,100vh\"><\u002Fdc-import><\u002Fsc-if>\n  <sc-if value=\"{{ isOnboarding }}\" hint-placeholder-val=\"{{ false }}\"><dc-import name=\"Onboarding\" on-next=\"{{ toMeetAssistants }}\" hint-size=\"100%,100vh\"><\u002Fdc-import><\u002Fsc-if>\n  <sc-if value=\"{{ isMeetAssistants }}\" hint-placeholder-val=\"{{ false }}\"><dc-import name=\"MeetAssistants\" on-next=\"{{ toOnboardingSetup }}\" on-back=\"{{ toOnboarding }}\" hint-size=\"100%,100vh\"><\u002Fdc-import><\u002Fsc-if>\n  <sc-if value=\"{{ isOnboardingSetup }}\" hint-placeholder-val=\"{{ false }}\"><dc-import name=\"OnboardingAssistantSetup\" on-finish=\"{{ toChatHubOnboarding }}\" on-back=\"{{ toMeetAssistants }}\" hint-size=\"100%,100vh\"><\u002Fdc-import><\u002Fsc-if>\n  <sc-if value=\"{{ isSetupDetail }}\" hint-placeholder-val=\"{{ false }}\"><dc-import name=\"AssistantSetupDetail\" on-start-chat=\"{{ toChatHubOnboarding }}\" hint-size=\"100%,100vh\"><\u002Fdc-import><\u002Fsc-if>\n\n  <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\"><dc-import name=\"Home\" on-nav=\"{{ onNav }}\" on-bell=\"{{ toNotifications }}\" on-chat=\"{{ toChatHub }}\" on-start-chat=\"{{ toChatFresh }}\" hint-size=\"100%,100vh\"><\u002Fdc-import><\u002Fsc-if>\n  <sc-if value=\"{{ isAssistants }}\" hint-placeholder-val=\"{{ false }}\"><dc-import name=\"Assistants\" on-nav=\"{{ onNav }}\" on-bell=\"{{ toNotifications }}\" on-chat=\"{{ toChatHub }}\" on-open-chat=\"{{ toChatFresh }}\" on-open-settings=\"{{ toSettings }}\" hint-size=\"100%,100vh\"><\u002Fdc-import><\u002Fsc-if>\n  <sc-if value=\"{{ isYou }}\" hint-placeholder-val=\"{{ false }}\"><dc-import name=\"You\" on-nav=\"{{ onNav }}\" on-bell=\"{{ toNotifications }}\" on-chat=\"{{ toChatHub }}\" on-open-life=\"{{ toChatFresh }}\" on-manage-access=\"{{ toAssistantsTab }}\" on-log-out=\"{{ toSignin }}\" on-delete-account=\"{{ toSignin }}\" hint-size=\"100%,100vh\"><\u002Fdc-import><\u002Fsc-if>\n  <sc-if value=\"{{ isChatHub }}\" hint-placeholder-val=\"{{ false }}\"><dc-import name=\"ChatHub\" mode=\"{{ chatHubMode }}\" on-back=\"{{ onBack }}\" on-home=\"{{ toHome }}\" on-bell=\"{{ toNotifications }}\" on-nav=\"{{ onNav }}\" on-open-chat=\"{{ toChat }}\" on-open-settings=\"{{ toSettings }}\" hint-size=\"100%,100vh\"><\u002Fdc-import><\u002Fsc-if>\n  <sc-if value=\"{{ isNotifications }}\" hint-placeholder-val=\"{{ false }}\"><dc-import name=\"Notifications\" on-back=\"{{ onBack }}\" on-home=\"{{ toHome }}\" on-nav=\"{{ onNav }}\" on-task=\"{{ toChatSeed }}\" hint-size=\"100%,100vh\"><\u002Fdc-import><\u002Fsc-if>\n  <sc-if value=\"{{ isChat }}\" hint-placeholder-val=\"{{ false }}\"><dc-import name=\"Chat\" assistant=\"{{ chatAssistant }}\" fresh=\"{{ chatFresh }}\" personalize=\"{{ chatPersonalize }}\" seed=\"{{ chatSeed }}\" on-back=\"{{ onBack }}\" on-home=\"{{ toHome }}\" on-bell=\"{{ toNotifications }}\" hint-size=\"100%,100vh\"><\u002Fdc-import><\u002Fsc-if>\n  <sc-if value=\"{{ isAssistantIndividual }}\" hint-placeholder-val=\"{{ false }}\"><dc-import name=\"AssistantIndividual\" on-back=\"{{ onBack }}\" on-home=\"{{ toHome }}\" hint-size=\"100%,100vh\"><\u002Fdc-import><\u002Fsc-if>\n  <sc-if value=\"{{ isAssistantSettings }}\" hint-placeholder-val=\"{{ false }}\"><dc-import name=\"AssistantSettings\" assistant=\"{{ settingsAssistant }}\" on-back=\"{{ onBack }}\" on-home=\"{{ toHome }}\" on-start-chat=\"{{ toChatFromSettings }}\" hint-size=\"100%,100vh\"><\u002Fdc-import><\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:880}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    const valid = ['signin','onboarding','meetassistants','onboardingsetup','setupdetail','home','assistants','you','notifications','chathub','chat','assistantindividual','assistantsettings'];\n    let start = 'home';\n    try {\n      const h = (window.location.hash || '').replace('#','').toLowerCase();\n      if (valid.includes(h)) start = h;\n    } catch (e) {}\n    this.state = { screen: start, hist: [], chatAssistant: 'Health coach', chatHubMode: 'normal', settingsAssistant: 'Home helper', chatFresh: false, chatSeed: '' };\n  }\n  go(s) { this.setState((p) => ({ screen: s, hist: [...p.hist, p.screen] })); }\n  back() { this.setState((p) => { const h = [...p.hist]; const prev = h.pop() || 'home'; return { screen: prev, hist: h }; }); }\n  renderVals() {\n    const s = this.state.screen;\n    const tabMap = { home: 'home', assistants: 'assistants', you: 'you' };\n    const rv = {\n      isSignin: s === 'signin', isOnboarding: s === 'onboarding', isOnboardingSetup: s === 'onboardingsetup',\n      isMeetAssistants: s === 'meetassistants', isSetupDetail: s === 'setupdetail', isHome: s === 'home', isAssistants: s === 'assistants', isYou: s === 'you',\n      isNotifications: s === 'notifications', isChatHub: s === 'chathub', isChat: s === 'chat',\n      isAssistantIndividual: s === 'assistantindividual', isAssistantSettings: s === 'assistantsettings',\n      chatAssistant: this.state.chatAssistant,\n      chatFresh: this.state.chatFresh,\n      chatSeed: this.state.chatSeed,\n      chatPersonalize: this.state.chatPersonalize,\n      chatHubMode: this.state.chatHubMode,\n      settingsAssistant: this.state.settingsAssistant,\n      onNav: (label) => this.go(tabMap[String(label).toLowerCase()] || 'home'),\n      onBack: () => this.back(),\n      toHome: () => this.go('home'),\n      toSignin: () => this.setState({ screen: 'signin', hist: [] }),\n      toAssistantsTab: () => this.go('assistants'),\n      toChat: (a) => {\n        const name = a && (a.name || a.label || a.assistant) ? (a.name || a.label || a.assistant) : null;\n        const fresh = this.state.chatHubMode === 'onboarding';\n        this.setState((p) => ({ chatAssistant: name || p.chatAssistant, chatFresh: fresh, chatSeed: '', chatPersonalize: false }));\n        this.go('chat');\n      },\n      onHubOpen: (a) => {\n        if (this.state.chatHubMode === 'onboarding') { rv.toSettings(a); }\n        else { rv.toChat(a); }\n      },\n      toChatHub: () => { this.setState({ chatHubMode: 'normal' }); this.go('chathub'); },\n      toChatHubOnboarding: () => { this.setState({ chatHubMode: 'onboarding' }); this.go('chathub'); },\n      toNotifications: () => this.go('notifications'),\n      toSettings: (a) => {\n        const name = a && (a.name || a.label || a.assistant) ? (a.name || a.label || a.assistant) : null;\n        this.setState((p) => ({ settingsAssistant: name || p.settingsAssistant }));\n        this.go('assistantsettings');\n      },\n      toChatSeed: (t) => {\n        this.setState({ chatSeed: (t && t.id) || '', chatFresh: false, chatPersonalize: false });\n        this.go('chat');\n      },\n      toChatFresh: (a) => {\n        const name = a && (a.name || a.label || a.assistant) ? (a.name || a.label || a.assistant) : null;\n        this.setState((p) => ({ chatAssistant: name || p.chatAssistant, chatFresh: true, chatSeed: '', chatPersonalize: !!(a && a.personalize) }));\n        this.go('chat');\n      },\n      toChatFromSettings: () => {\n        this.setState((p) => ({ chatAssistant: p.settingsAssistant, chatFresh: true, chatSeed: '' }));\n        this.go('chat');\n      },\n      toOnboarding: () => this.go('onboarding'),\n      toMeetAssistants: () => this.go('meetassistants'),\n      toOnboardingSetup: () => this.go('onboardingsetup'),\n      toSetupDetail: () => this.go('setupdetail'),\n    };\n    return rv;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
