  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"293d855c-e147-499e-a023-a8de1d82684d\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  \n  <style>\n    body { margin: 0; background: #f4f5f6; font-family: -apple-system, system-ui, \"Segoe UI\", sans-serif; }\n    * { box-sizing: border-box; }\n    a { color: #2e9e6b; }\n    a:hover { color: #237d54; }\n    ::placeholder { color: #9a9a9a; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"{{ outerStyle }}\">\n\n  <sc-if value=\"{{ showChrome }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"text-align:center;\">\n      <div style=\"font:600 11.5px -apple-system,system-ui; color:#a8a8a8; text-transform:uppercase; letter-spacing:0.8px;\">Capsule prototype · Alison, Jo, Hetta, Axel, Maya<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"{{ phoneStyle }}\">\n\n    <!-- Tab header -->\n    <sc-if value=\"{{ inTabs }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex; align-items:center; gap:9px; padding:18px 18px 12px;\">\n        <div style=\"display:flex; align-items:center; gap:3px;\">\n          <span style=\"color:#a8a8a8; font:400 16px -apple-system,system-ui;\">(<\u002Fspan>\n          <div style=\"width:13px; height:13px; border-radius:50%; border:2px solid #2b2b2b;\"><\u002Fdiv>\n          <span style=\"color:#a8a8a8; font:400 16px -apple-system,system-ui;\">)<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font:700 17px -apple-system,system-ui; color:#2b2b2b; letter-spacing:-0.2px;\">{{ tabTitle }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Detail header -->\n    <sc-if value=\"{{ inTabs }}\" hint-placeholder-val=\"{{ false }}\">\n    <\u002Fsc-if>\n    <sc-if value=\"{{ isDetail }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:grid; grid-template-columns:auto 1fr auto; align-items:center; padding:18px 18px 12px; gap:8px;\">\n        <div sc-camel-on-click=\"{{ goBack }}\" style=\"font:400 22px -apple-system,system-ui; color:#2b2b2b; line-height:1; cursor:pointer;\">‹<\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:8px; justify-self:center;\">\n          <sc-if value=\"{{ isAssistantDetail }}\" hint-placeholder-val=\"{{ true }}\">\n            <span style=\"{{ detailAvatarStyle }}\">{{ detailAvatarGlyph }}<\u002Fspan>\n          <\u002Fsc-if>\n          <span style=\"font:600 14.5px -apple-system,system-ui; color:#2b2b2b;\">{{ detailTitle }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"width:22px;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ FEED ============ -->\n    <sc-if value=\"{{ isFeed }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"flex:1; padding:0 18px; overflow-y:auto; display:flex; flex-direction:column; gap:20px;\">\n        <div style=\"display:flex; flex-direction:column; align-items:center; gap:7px;\">\n          <div style=\"width:48px; height:48px; border-radius:50%; background:#e6e7e9; display:flex; align-items:center; justify-content:center; font:600 18px -apple-system,system-ui; color:#9a9a9a;\">A<\u002Fdiv>\n          <div style=\"text-align:center;\">\n            <div style=\"font:700 16px -apple-system,system-ui; color:#2b2b2b;\">Alison<\u002Fdiv>\n            <div style=\"font:400 11.5px -apple-system,system-ui; color:#9a9a9a;\">Good morning<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div>\n          <div style=\"font:600 11px -apple-system,system-ui; color:#a8a8a8; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:9px;\">My life<\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:10px;\">\n            <div sc-camel-on-click=\"{{ openHomeUpdates }}\" style=\"border:1px solid #e7e8ea; border-radius:14px; padding:12px; display:flex; flex-direction:column; gap:20px; cursor:pointer;\">\n              <div style=\"width:30px; height:30px; border-radius:9px; background:#eceef0;\"><\u002Fdiv>\n              <div><div style=\"font:600 13px -apple-system,system-ui; color:#2b2b2b;\">Home<\u002Fdiv><div style=\"font:400 11px -apple-system,system-ui; color:#9a9a9a;\">All quiet<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div sc-camel-on-click=\"{{ openHealthUpdates }}\" style=\"border:1px solid #e7e8ea; border-radius:14px; padding:12px; display:flex; flex-direction:column; gap:20px; cursor:pointer;\">\n              <div style=\"width:30px; height:30px; border-radius:9px; background:#e4f3ea; display:flex; align-items:center; justify-content:center; color:#2e9e6b; font:700 13px -apple-system,system-ui;\">♥<\u002Fdiv>\n              <div><div style=\"font:600 13px -apple-system,system-ui; color:#2b2b2b;\">Health<\u002Fdiv><div style=\"font:400 11px -apple-system,system-ui; color:#9a9a9a;\">3 updates<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div sc-camel-on-click=\"{{ openFamilyUpdates }}\" style=\"border:1px solid #e7e8ea; border-radius:14px; padding:12px; display:flex; flex-direction:column; gap:20px; cursor:pointer;\">\n              <div style=\"width:30px; height:30px; border-radius:9px; background:#eceef0;\"><\u002Fdiv>\n              <div><div style=\"font:600 13px -apple-system,system-ui; color:#2b2b2b;\">Family &amp; Friends<\u002Fdiv><div style=\"font:400 11px -apple-system,system-ui; color:#9a9a9a;\">2 reminders<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div sc-camel-on-click=\"{{ openFinanceUpdates }}\" style=\"border:1px solid #e7e8ea; border-radius:14px; padding:12px; display:flex; flex-direction:column; gap:20px; cursor:pointer;\">\n              <div style=\"width:30px; height:30px; border-radius:9px; background:#eceef0;\"><\u002Fdiv>\n              <div><div style=\"font:600 13px -apple-system,system-ui; color:#2b2b2b;\">Finances<\u002Fdiv><div style=\"font:400 11px -apple-system,system-ui; color:#9a9a9a;\">On track '#8a8a8a' },\n  { id: 'career', name: 'Career Coach', subtitle: 'Growth & opportunities', accent: false, view: 'hetta', glyph: '↗', bg: '#eceef0', fg: '#8a8a8a' },\n  { id: 'finance', name: 'Finance Helper', subtitle: 'Subscriptions & spending', accent: false, view: 'maya', glyph: '$', bg: '#eceef0', fg: '#8a8a8a' },\n];\nconst ASSISTANT_BY_VIEW = ASSISTANTS.reduce((m, a) => { m[a.view] = a; return m; }, {});\n\nconst CAPABILITIES = {\n  homehelper: [\n    { key: 'health', label: 'Health data', sublabel: 'Activity & nutrition' },\n    { key: 'shopping', label: 'Shopping & orders', sublabel: 'Place grocery orders' },\n    { key: 'calendar', label: 'Calendar & reminders', sublabel: 'Create reminders' },\n    { key: 'whatsapp', label: 'Messaging (WhatsApp)', sublabel: 'Send reminders & nudges' },\n    { key: 'contacts', label: 'Contacts', sublabel: '' },\n  ],\n  healthcoach: [\n    { key: 'healthdata', label: 'Health & fitness data', sublabel: 'Appointments, activity' },\n    { key: 'calendar', label: 'Calendar', sublabel: 'Book & reschedule' },\n    { key: 'messaging', label: 'Messaging', sublabel: 'WhatsApp reminders' },\n  ],\n  companion: [\n    { key: 'scoped', label: 'Scoped chat context', sublabel: 'What you explicitly share' },\n    { key: 'fullhistory', label: 'Full conversation history', sublabel: '' },\n  ],\n  career: [\n    { key: 'conversations', label: 'Career conversations', sublabel: 'Values, skills, goals' },\n    { key: 'calendar', label: 'Calendar', sublabel: 'Interview scheduling' },\n  ],\n  finance: [\n    { key: 'subscriptions', label: 'Subscriptions & spending', sublabel: 'Flag & cancel' },\n    { key: 'accounts', label: 'Bank accounts', sublabel: 'Read balances & transactions' },\n    { key: 'messaging', label: 'Messaging', sublabel: 'Renewal reminders' },\n  ],\n};\n\nconst DEFAULT_TOGGLES = {\n  homehelper: { health: true, shopping: true, calendar: true, whatsapp: true, contacts: false },\n  healthcoach: { healthdata: true, calendar: true, messaging: false },\n  companion: { scoped: true, fullhistory: false },\n  career: { conversations: true, calendar: false },\n  finance: { subscriptions: true, accounts: true, messaging: false },\n};\n\nconst TAB_TITLES = { feed: 'My Life', assistants: 'Assistants', config: 'Configuration', access: 'Access' };\nconst DETAIL_TITLES = { alison: 'Home Helper', jo: 'Companion', hetta: 'Career Coach', axel: 'Health Coach + Marko', maya: 'Finance Helper', healthUpdates: 'Health', familyUpdates: 'Family & Friends', homeUpdates: 'Home', financeUpdates: 'Finances' };\n\nclass Component extends DCLogic {\n  state = {\n    view: 'feed',\n    returnTo: 'feed',\n    configSelected: 'homehelper',\n    toggles: JSON.parse(JSON.stringify(DEFAULT_TOGGLES)),\n    aCta: 'pending',\n    chatInput: '',\n    listening: false,\n    chats: { alison: [], axel: [], maya: [] },\n    jIncluded: [true, true],\n    jPrivate: [false, false, false],\n    jGranted: false,\n    hExported: false,\n    mRemind: true,\n    mStatus: 'pending',\n    axelSlot: null,\n    viewportWidth: typeof window !== 'undefined' ? window.innerWidth : 1024,\n  };\n\n  threadRef = React.createRef();\n  componentDidUpdate() {\n    const el = this.threadRef.current;\n    if (el) el.scrollTop = el.scrollHeight;\n  }\n\n  componentDidMount() {\n    this.onResize = () => this.setState({ viewportWidth: window.innerWidth });\n    window.addEventListener('resize', this.onResize);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('resize', this.onResize);\n  }\n\n  goFeed = () => this.setState({ view: 'feed' });\n  goAssistants = () => this.setState({ view: 'assistants' });\n  goConfig = () => this.setState({ view: 'config' });\n  goAccess = () => this.setState({ view: 'access' });\n  goBack = () => this.setState(s => ({ view: s.returnTo }));\n  openDetail = (view, returnTo) => this.setState({ view, returnTo });\n  openHealthUpdates = () => this.openDetail('healthUpdates', 'feed');\n  openFamilyUpdates = () => this.openDetail('familyUpdates', 'feed');\n  openHomeUpdates = () => this.openDetail('homeUpdates', 'feed');\n  openFinanceUpdates = () => this.openDetail('financeUpdates', 'feed');\n\n  swapFriday = () => this.setState({ aCta: 'swapped' });\n  keepThu = () => this.setState({ aCta: 'kept' });\n  onInputChange = (e) => this.setState({ chatInput: e.target.value });\n  onInputKeyDown = (e) => { if (e.key === 'Enter') { e.preventDefault(); this.sendMessage(); } };\n  voiceInput = () => this.setState(s => ({ listening: !s.listening }));\n  sendMessage = () => {\n    const text = this.state.chatInput.trim();\n    if (!text) return;\n    const view = this.state.view;\n    if (!['alison', 'axel', 'maya'].includes(view)) return;\n    this.setState(s => ({ chats: { ...s.chats, [view]: [...s.chats[view], { isUser: true, isAssistant: false, text }] }, chatInput: '' }));\n    const replyIndex = this.state.chats[view].filter(m => m.isUser).length % REPLIES.length;\n    setTimeout(() => {\n      this.setState(s => ({ chats: { ...s.chats, [view]: [...s.chats[view], { isUser: false, isAssistant: true, text: REPLIES[replyIndex] }] } }));\n    }, 700);\n  };\n\n  toggleIncluded = (i) => this.setState(s => { const a = s.jIncluded.slice(); a[i] = !a[i]; return { jIncluded: a }; });\n  togglePrivate = (i) => this.setState(s => { const a = s.jPrivate.slice(); a[i] = !a[i]; return { jPrivate: a }; });\n  grantAccess = () => this.setState({ jGranted: true });\n  revokeAccess = () => this.setState({ jGranted: false });\n\n  exportProfile = () => this.setState({ hExported: true });\n\n  toggleRemind = () => this.setState(s => ({ mRemind: !s.mRemind }));\n  cancelStream = () => this.setState({ mStatus: 'cancelled' });\n  keepStream = () => this.setState({ mStatus: 'kept' });\n\n  pickA = () => this.setState({ axelSlot: 'A' });\n  pickB = () => this.setState({ axelSlot: 'B' });\n  pickNeither = () => this.setState({ axelSlot: 'neither' });\n\n  selectConfig = (id) => this.setState({ configSelected: id });\n  toggleCapability = (assistantId, key) => this.setState(s => {\n    const toggles = { ...s.toggles, [assistantId]: { ...s.toggles[assistantId], [key]: !s.toggles[assistantId][key] } };\n    return { toggles };\n  });\n\n  renderVals() {\n    const { view, configSelected, toggles, aCta, chatInput, listening, chats, jIncluded, jPrivate, jGranted, hExported, mRemind, mStatus, axelSlot, viewportWidth } = this.state;\n\n    const isMobile = viewportWidth <= 520;\n    const outerStyle = isMobile\n      ? { minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', padding: 0, margin: 0 }\n      : { minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '22px', padding: '50px 16px' };\n    const phoneStyle = isMobile\n      ? { width: '100vw', height: '100vh', background: '#fff', overflow: 'hidden', display: 'flex', flexDirection: 'column' }\n      : { width: '320px', height: '680px', background: '#fff', borderRadius: '34px', border: '1px solid #dfe0e3', boxShadow: '0 6px 24px rgba(0,0,0,.07)', overflow: 'hidden', display: 'flex', flexDirection: 'column' };\n\n    const TABS = ['feed', 'assistants', 'config', 'access'];\n    const inTabs = TABS.includes(view);\n    const isDetail = !inTabs;\n\n    const checkboxStyle = (checked) => ({\n      width: '17px', height: '17px', flexShrink: 0, borderRadius: '5px',\n      border: '1.5px solid ' + (checked ? '#2e9e6b' : '#dfe1e4'),\n      background: checked ? '#2e9e6b' : '#fff',\n      color: '#fff', fontSize: '11px', lineHeight: '14px', textAlign: 'center',\n      display: 'inline-block',\n    });\n\n    const includedItems = [\n      { label: 'What I need and why', mark: jIncluded[0] ? '✓' : '', boxStyle: checkboxStyle(jIncluded[0]), onClick: () => this.toggleIncluded(0) },\n      { label: 'The decision I made', mark: jIncluded[1] ? '✓' : '', boxStyle: checkboxStyle(jIncluded[1]), onClick: () => this.toggleIncluded(1) },\n    ];\n    const privateLabels = ['Raw reflections (6 wks)', 'Relationship history', 'Everything else'];\n    const privateItems = privateLabels.map((label, i) => ({ label, mark: jPrivate[i] ? '✓' : '', boxStyle: checkboxStyle(jPrivate[i]), onClick: () => this.togglePrivate(i) }));\n\n    const profileSections = [\n      { label: 'Values', value: 'Autonomy · Craft · Impact' },\n      { label: 'Skills that travel', value: 'Regulatory writing · Research · Stakeholder translation' },\n      { label: 'Dealbreakers', value: 'Salary floor · No relocation' },\n      { label: 'Direction', value: 'Compliance comms, healthcare' },\n    ];\n\n    const healthUpdateItems = [\n      { title: 'Shopping list updated', detail: 'Home Helper balanced this week\\u2019s groceries for training \\u2014 +Leafy greens, +Salmon, \\u2212Soda.' },\n      { title: 'Order placed', detail: '12 items \\u00b7 $84.20, arriving Tue 8:00\\u201310:00 AM.' },\n      { title: 'Check-up prep', detail: 'Dr. Patel, Thu 10:30 AM \\u2014 records shared securely in-app.' },\n    ];\n    const familyUpdateItems = [\n      { title: 'Leo\\u2019s pickup', detail: 'Football pickup Thu 18:30 \\u2014 flagged against your interval session.' },\n      { title: 'Mom', detail: '\\u201cSounds great, see you Sat!\\u201d' },\n    ];\n    const homeUpdateItems = [\n      { title: 'No open tasks', detail: 'Home Helper will flag anything that needs your attention here.' },\n    ];\n    const financeUpdateItems = [\n      { title: 'StreamMax flagged', detail: 'Untouched for two months \\u2014 Finance Helper suggested canceling.' },\n      { title: 'LearnPro renewal', detail: 'Reminder set for March, ahead of the renewal date.' },\n    ];\n\n    const feedCards = [\n      { title: 'Home Helper', preview: 'Compared notes on your Thu schedule', iconGlyph: ASSISTANT_BY_VIEW.alison.glyph, iconBg: ASSISTANT_BY_VIEW.alison.bg, iconFg: ASSISTANT_BY_VIEW.alison.fg, onClick: () => this.openDetail('alison', 'feed') },\n      { title: 'Finance Helper', preview: 'Flagged an unused subscription', iconGlyph: ASSISTANT_BY_VIEW.maya.glyph, iconBg: ASSISTANT_BY_VIEW.maya.bg, iconFg: ASSISTANT_BY_VIEW.maya.fg, onClick: () => this.openDetail('maya', 'feed') },\n      { title: 'Health Coach', preview: 'Found two slots that work for you and Marko', iconGlyph: ASSISTANT_BY_VIEW.axel.glyph, iconBg: ASSISTANT_BY_VIEW.axel.bg, iconFg: ASSISTANT_BY_VIEW.axel.fg, onClick: () => this.openDetail('axel', 'feed') },\n      { title: 'Companion', preview: 'Share sheet ready for your partner chat', iconGlyph: ASSISTANT_BY_VIEW.jo.glyph, iconBg: ASSISTANT_BY_VIEW.jo.bg, iconFg: ASSISTANT_BY_VIEW.jo.fg, onClick: () => this.openDetail('jo', 'feed') },\n    ];\n\n    const assistantRows = ASSISTANTS.map(a => ({\n      name: a.name, subtitle: a.subtitle,\n      avatarStyle: { width: '30px', height: '30px', borderRadius: '9px', background: a.bg, flex: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', color: a.fg, font: '700 13px -apple-system,system-ui' },\n      glyph: a.glyph,\n      onChat: () => this.openDetail(a.view, 'assistants'),\n    }));\n\n    const detailAvatarMeta = ASSISTANT_BY_VIEW[view];\n    const isAssistantDetail = !!detailAvatarMeta;\n    const detailAvatarStyle = detailAvatarMeta\n      ? { width: '22px', height: '22px', borderRadius: '7px', background: detailAvatarMeta.bg, flex: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', color: detailAvatarMeta.fg, font: '700 11px -apple-system,system-ui' }\n      : {};\n    const detailAvatarGlyph = detailAvatarMeta ? detailAvatarMeta.glyph : '';\n\n    const configPills = ASSISTANTS.map(a => ({\n      name: a.name,\n      onClick: () => this.selectConfig(a.id),\n      style: {\n        padding: '7px 13px', borderRadius: '10px', border: '1px solid #dfe0e3',\n        fontSize: '12px', fontFamily: '-apple-system,system-ui', fontWeight: 600,\n        whiteSpace: 'nowrap', cursor: 'pointer',\n        background: configSelected === a.id ? '#2a2d34' : '#fff',\n        color: configSelected === a.id ? '#fff' : '#5b5b5b',\n      },\n    }));\n\n    const capsForSelected = CAPABILITIES[configSelected];\n    const togglesForSelected = toggles[configSelected];\n    const configCapabilities = capsForSelected.map(c => {\n      const on = togglesForSelected[c.key];\n      return {\n        label: c.label, sublabel: c.sublabel,\n        onToggle: () => this.toggleCapability(configSelected, c.key),\n        trackStyle: { width: '40px', height: '24px', borderRadius: '12px', background: on ? '#34c759' : '#e3e4e7', position: 'relative', flex: 'none', cursor: 'pointer' },\n        knobStyle: { position: 'absolute', top: '2px', left: on ? '18px' : '2px', width: '20px', height: '20px', borderRadius: '50%', background: '#fff', transition: 'left .15s' },\n      };\n    });\n    const configSelectedName = ASSISTANTS.find(a => a.id === configSelected).name;\n\n    const ledgerItems = [];\n    ASSISTANTS.forEach(a => {\n      CAPABILITIES[a.id].forEach(c => {\n        if (toggles[a.id][c.key]) {\n          ledgerItems.push({\n            assistant: a.name, label: c.label,\n            onRevoke: () => this.toggleCapability(a.id, c.key),\n          });\n        }\n      });\n    });\n    if (jGranted) {\n      ledgerItems.push({ assistant: 'Companion', label: 'Shared with partner (this conversation only)', onRevoke: this.revokeAccess });\n    }\n\n    const navColor = (active) => (active ? '#2a2d34' : '#c7c8cb');\n    const navLabelStyle = (active) => ({ font: '600 10px -apple-system,system-ui', color: active ? '#2a2d34' : '#a8a8a8' });\n\n    return {\n      outerStyle, phoneStyle, showChrome: !isMobile,\n      inTabs, isDetail,\n      tabTitle: TAB_TITLES[view] || '', detailTitle: DETAIL_TITLES[view] || '',\n      isAssistantDetail, detailAvatarStyle, detailAvatarGlyph,\n      goBack: this.goBack,\n      isFeed: view === 'feed', isAssistants: view === 'assistants', isConfig: view === 'config', isAccess: view === 'access',\n      isAlison: view === 'alison', isJo: view === 'jo', isHetta: view === 'hetta', isAxel: view === 'axel', isMaya: view === 'maya',\n      isHealthUpdates: view === 'healthUpdates', isFamilyUpdates: view === 'familyUpdates',\n      isHomeUpdates: view === 'homeUpdates', isFinanceUpdates: view === 'financeUpdates',\n      openHealthUpdates: this.openHealthUpdates, openFamilyUpdates: this.openFamilyUpdates,\n      openHomeUpdates: this.openHomeUpdates, openFinanceUpdates: this.openFinanceUpdates,\n      healthUpdateItems, familyUpdateItems, homeUpdateItems, financeUpdateItems,\n      feedCards, assistantRows,\n      configPills, configCapabilities, configSelectedName,\n      ledgerItems, ledgerEmpty: ledgerItems.length === 0,\n      threadRef: this.threadRef,\n      ctaPending: aCta === 'pending', ctaSwapped: aCta === 'swapped', ctaKept: aCta === 'kept',\n      swapFriday: this.swapFriday, keepThu: this.keepThu,\n      chatMessages: chats[view] || [], inputValue: chatInput,\n      onInputChange: this.onInputChange, onInputKeyDown: this.onInputKeyDown, sendMessage: this.sendMessage,\n      voiceInput: this.voiceInput,\n      includedItems, privateItems,\n      jNotGranted: !jGranted, jGranted, grantAccess: this.grantAccess, revokeAccess: this.revokeAccess,\n      profileSections, hNotExported: !hExported, hExported, exportProfile: this.exportProfile,\n      remindMark: mRemind ? '✓' : '', remindBoxStyle: checkboxStyle(mRemind), toggleRemind: this.toggleRemind, remindOn: mRemind,\n      mPending: mStatus === 'pending', mCancelled: mStatus === 'cancelled', mKept: mStatus === 'kept',\n      cancelStream: this.cancelStream, keepStream: this.keepStream,\n      axelPending: axelSlot === null, axelBooked: axelSlot === 'A' || axelSlot === 'B', axelNeither: axelSlot === 'neither',\n      axelSlotLabel: axelSlot === 'A' ? 'A · Thu 07:00' : axelSlot === 'B' ? 'B · Fri 18:00' : '',\n      pickA: this.pickA, pickB: this.pickB, pickNeither: this.pickNeither,\n      goFeed: this.goFeed, goAssistants: this.goAssistants, goConfig: this.goConfig, goAccess: this.goAccess,\n      navFeedDotOuter: { width: '18px', height: '18px', borderRadius: '50%', border: '2px solid ' + navColor(view === 'feed'), display: 'flex', alignItems: 'center', justifyContent: 'center' },\n      navFeedDotInner: { width: '6px', height: '6px', borderRadius: '50%', background: navColor(view === 'feed') },\n      navFeedLabel: navLabelStyle(view === 'feed'),\n      navAsstCircle1: { width: '13px', height: '13px', borderRadius: '50%', border: '2px solid ' + navColor(view === 'assistants'), background: '#fff' },\n      navAsstCircle2: { width: '13px', height: '13px', borderRadius: '50%', border: '2px solid ' + navColor(view === 'assistants'), background: '#fff', marginLeft: '-5px' },\n      navAsstLabel: navLabelStyle(view === 'assistants'),\n      navCfgBar1: { height: '2.5px', width: '100%', borderRadius: '2px', background: navColor(view === 'config') },\n      navCfgBar2: { height: '2.5px', width: '65%', borderRadius: '2px', background: navColor(view === 'config') },\n      navCfgBar3: { height: '2.5px', width: '85%', borderRadius: '2px', background: navColor(view === 'config') },\n      navCfgLabel: navLabelStyle(view === 'config'),\n      navAccessOuter: { width: '17px', height: '19px', borderRadius: '5px', border: '2px solid ' + navColor(view === 'access'), display: 'flex', alignItems: 'center', justifyContent: 'center' },\n      navAccessInner: { width: '5px', height: '5px', borderRadius: '50%', background: navColor(view === 'access') },\n      navAccessLabel: navLabelStyle(view === 'access'),\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
