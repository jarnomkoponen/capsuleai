<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { margin: 0; }
  .ma-btn:focus-visible, .ma-back:focus-visible { outline: 2px solid #0F766E; outline-offset: 2px; }
</style>
</helmet>
<dc-import name="UniversalCanvasModule" hint-size="100%,100%">
  <div style="flex:1;display:flex;flex-direction:column;padding:12px 20px 24px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI',system-ui,sans-serif;">
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0 18px;">
      <button type="button" class="ma-back" onClick="{{ onBack }}" aria-label="Back" style="flex:none;width:44px;height:44px;display:inline-flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;border-radius:8px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15 5l-7 7 7 7" stroke="#0F766E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <span aria-hidden="true" style="flex:1;"></span>
      <dc-import name="LogoModule" size="header" hint-size="26px,26px"></dc-import>
      <span aria-hidden="true" style="flex:1;"></span>
      <span aria-hidden="true" style="flex:none;width:44px;"></span>
    </div>

    <h1 style="margin:0 0 22px;font-size:28px;line-height:34px;font-weight:700;letter-spacing:-0.015em;color:#17171A;">Meet your assistants</h1>

    <div style="flex:1;overflow-y:auto;">
      <ul style="list-style:none;margin:0;padding:0;">
        <sc-for list="{{ assistants }}" as="a" hint-placeholder-count="3">
          <li style="display:flex;gap:14px;padding:16px 0;border-top:1px solid #ECECEE;">
            <span aria-hidden="true" style="flex:none;width:40px;height:40px;border-radius:50%;background:#F7F7F8;border:1px solid #ECECEE;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:#3A3A40;">{{ a.initial }}</span>
            <span style="flex:1;min-width:0;">
              <span style="display:block;font-size:17px;line-height:22px;font-weight:600;color:#17171A;">{{ a.name }}</span>
              <span style="display:block;font-size:15px;line-height:21px;color:#6E6E77;margin-top:2px;">{{ a.blurb }}</span>
            </span>
          </li>
        </sc-for>
      </ul>
    </div>

    <button type="button" class="ma-btn" onClick="{{ onNext }}" style="margin-top:20px;appearance:none;border:none;background:#0F766E;color:#FFFFFF;font:600 17px/1.2 inherit;min-height:52px;border-radius:26px;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;">Now, let’s make assistants work for you</button>
  </div>
</dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:880}}">
class Component extends DCLogic {
  blurbs() {
    return {
      'Home helper': 'Keeps the week running without you connecting every dot.',
      'Health coach': 'Keeps your health on track, and knows when it\u2019s a question for your doctor.',
      'Training buddy': 'The accountability that actually makes you show up.',
      'Companion': 'A private place to think, and the right words when you need them.',
      'Financial coach': 'Money that fits the life you actually live.',
      'Career coach': 'Turns your own thinking into a direction, and an asset you keep.',
    };
  }
  topicAssistants() {
    return {
      family: ['Home helper'], health: ['Health coach', 'Training buddy'],
      relationships: ['Companion'], career: ['Career coach'],
      finance: ['Financial coach'], recovery: ['Health coach', 'Home helper'],
    };
  }
  selectedAssistants() {
    let sel = [];
    try { sel = JSON.parse(window.localStorage.getItem('capsule.helpTopics') || '[]'); } catch (e) {}
    const map = this.topicAssistants();
    const names = [];
    sel.forEach((t) => (map[t] || []).forEach((n) => { if (!names.includes(n)) names.push(n); }));
    const order = ['Home helper', 'Health coach', 'Training buddy', 'Companion', 'Career coach', 'Financial coach'];
    const ordered = order.filter((n) => names.includes(n));
    return ordered.length ? ordered : ['Home helper'];
  }
  renderVals() {
    const b = this.blurbs();
    const assistants = this.selectedAssistants().map((n) => ({ name: n, initial: n.charAt(0), blurb: b[n] || '' }));
    return {
      assistants,
      onNext: this.props.onNext || (() => { try { window.location.href = 'OnboardingAssistantSetup.dc.html'; } catch (e) {} }),
      onBack: this.props.onBack || (() => { try { window.location.href = 'Onboarding.dc.html'; } catch (e) {} }),
    };
  }
}
</script>
</body>
</html>
