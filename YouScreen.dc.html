<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
*{box-sizing:border-box}html,body{margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",system-ui,sans-serif;background:#D8D8D3;color:#1A1A1A;-webkit-font-smoothing:antialiased}
</style>
</helmet>
<div style="max-width:440px;margin:0 auto;min-height:100vh;background:#F4F4F1;display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,0.06)">
  <main role="main" style="display:flex;flex-direction:column;flex:1;min-height:0">
    <div style="position:sticky;top:0;z-index:5;background:#F4F4F1;padding-bottom:2px">
      <dc-import name="TopNavModule" variant="home" title="You" startChat="{{ startChat }}" hint-size="100%,88px"></dc-import>
    </div>
    <div style="flex:1;overflow:auto;padding-bottom:8px">
      <div style="display:flex;align-items:center;gap:14px;padding:8px 16px 4px">
        <span aria-hidden="true" style="width:52px;height:52px;flex:none;border-radius:50%;background:#1A1A1A;color:#FFFFFF;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700">A</span>
        <div><div style="font-size:24px;line-height:29px;font-weight:700;letter-spacing:-0.01em">Alison</div><div style="font-size:15px;line-height:20px;color:#454541">You're in control of what's shared.</div></div>
      </div>
      <dc-import name="LifeTopicsModule" variant="you-view" topics="{{ topics }}" addAction="{{ addTopic }}" hint-size="100%,200px"></dc-import>
      <dc-import name="ConnectedAppsModule" connections="{{ connections }}" hint-size="100%,620px"></dc-import>
    </div>
    <div style="position:sticky;bottom:0;background:linear-gradient(to top,#F4F4F1 70%,rgba(244,244,241,0));padding-top:4px">
      <dc-import name="BottomNavModule" items="{{ navItems }}" hint-size="100%,88px"></dc-import>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 440, &quot;height&quot;: 940 } }">
class Component extends DCLogic {
  renderVals() {
    const go = this.props.onNavigate || (() => {});
    return {
      startChat: () => go('jo'),
      topics: [
        { id:'home', label:'Home', status:'2 tasks', icon:'home', action:() => {} },
        { id:'health', label:'Health', status:'recovery', icon:'health', action:() => go('becca') },
        { id:'family', label:'Family & Friends', status:'', icon:'family', action:() => go('alison') },
        { id:'money', label:'Money', status:'1 review', icon:'money', action:() => go('maya') },
        { id:'work', label:'Work', status:'', icon:'work', action:() => {} },
      ],
      addTopic: () => {},
      connections: [
        { id:'gcal', name:'Google Calendar', icon:'calendar', connected:true, scope:'reads your schedule' },
        { id:'gmail', name:'Gmail', icon:'mail', connected:true, scope:'reads receipts & confirmations' },
        { id:'bank', name:'Monzo Bank', icon:'bank', connected:true, scope:'reads balances & transactions' },
        { id:'grocery', name:'Tesco Groceries', icon:'grocery', connected:true, scope:'can place orders you approve' },
        { id:'health', name:'Public health data', icon:'health', connected:false, scope:'reads local health guidance' },
        { id:'photos', name:'Apple Photos', icon:'photos', connected:false, scope:'reads photos you pick' },
      ],
      navItems: [
        { label:'Home', icon:'home', current:false, action:() => go('home') },
        { label:'Assistants', icon:'assistants', current:false, action:() => go('assistants') },
        { label:'You', icon:'you', current:true, action:() => go('you') },
      ],
    };
  }
}
</script>
</body>
</html>
