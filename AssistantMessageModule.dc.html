<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>* { box-sizing: border-box; -webkit-font-smoothing: antialiased; } body { margin: 0; }</style>
</helmet>
<div style="font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:flex-start;gap:4px;max-width:88%;">
  <span style="font-size:12px;line-height:16px;font-weight:600;color:#6E6E77;padding-left:4px;">{{ assistant }}</span>
  <div style="background:#F7F7F8;border:1px solid #ECECEE;border-radius:4px 16px 16px 16px;padding:12px 16px;">
    <sc-if value="{{ hasStatus }}" hint-placeholder-val="{{ false }}">
      <div style="font-size:13px;line-height:18px;color:#6E6E77;margin-bottom:6px;">{{ status }}</div>
    </sc-if>
    <p style="margin:0;font-size:17px;line-height:24px;color:#17171A;">{{ body }}</p>
  </div>
  <sc-if value="{{ hasTime }}" hint-placeholder-val="{{ false }}">
    <span style="font-size:12px;line-height:16px;color:#B8B8BF;padding-left:4px;">{{ timestamp }}</span>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:140},&quot;assistant&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Home helper&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;status&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;body&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;I checked your calendar and found two open slots this week. Want me to hold one?&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;timestamp&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return {
      assistant: this.props.assistant || 'Home helper',
      status: this.props.status || '',
      hasStatus: !!this.props.status,
      body: this.props.body || 'Here is what I found for you.',
      timestamp: this.props.timestamp || '',
      hasTime: !!this.props.timestamp,
    };
  }
}
</script>
</body>
</html>
