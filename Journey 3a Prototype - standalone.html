document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"d30d7671-754c-4ada-863d-451ea604125a\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  \n  <style>\n    body { margin: 0; background: #f4f5f6; font-family: -apple-system, system-ui, \"Segoe UI\", sans-serif; }\n    * { box-sizing: border-box; }\n    a { color: #2e9e6b; }\n    a:hover { color: #237d54; }\n    ::placeholder { color: #9a9a9a; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"{{ outerStyle }}\">\n\n  <sc-if value=\"{{ showChrome }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"text-align:center;\">\n      <div style=\"font:600 11.5px -apple-system,system-ui; color:#a8a8a8; text-transform:uppercase; letter-spacing:0.8px;\">Capsule prototype · Alison, Jo, Hetta, Axel, Maya<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"{{ phoneStyle }}\">\n\n    <!-- Tab header -->\n    <sc-if value=\"{{ inTabs }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex; align-items:center; gap:9px; padding:18px 18px 12px;\">\n        <div style=\"display:flex; align-items:center; gap:3px;\">\n          <span style=\"color:#a8a8a8; font:400 16px -apple-system,system-ui;\">(<\u002Fspan>\n          <div style=\"width:13px; height:13px; border-radius:50%; border:2px solid #2b2b2b;\"><\u002Fdiv>\n          <span style=\"color:#a8a8a8; font:400 16px -apple-system,system-ui;\">)<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font:700 17px -apple-system,system-ui; color:#2b2b2b; letter-spacing:-0.2px;\">{{ tabTitle }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Detail header -->\n    <sc-if value=\"{{ inTabs }}\" hint-placeholder-val=\"{{ false }}\">\n    <\u002Fsc-if>\n    <sc-if value=\"{{ isDetail }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:grid; grid-template-columns:auto 1fr auto; align-items:center; padding:18px 18px 12px; gap:8px;\">\n        <div onclick=\"{{ goBack }}\" style=\"font:400 22px -apple-system,system-ui; color:#2b2b2b; line-height:1; cursor:pointer;\">‹<\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:8px; justify-self:center;\">\n          <sc-if value=\"{{ isAssistantDetail }}\" hint-placeholder-val=\"{{ true }}\">\n            <span style=\"{{ detailAvatarStyle }}\">{{ detailAvatarGlyph }}<\u002Fspan>\n          <\u002Fsc-if>\n          <span style=\"font:600 14.5px -apple-system,system-ui; color:#2b2b2b;\">{{ detailTitle }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"width:22px;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ FEED ============ -->\n    <sc-if value=\"{{ isFeed }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"flex:1; padding:0 18px; overflow-y:auto; display:flex; flex-direction:column; gap:20px;\">\n        <div style=\"display:flex; flex-direction:column; align-items:center; gap:7px;\">\n          <div style=\"width:48px; height:48px; border-radius:50%; background:#e6e7e9; display:flex; align-items:center; justify-content:center; font:600 18px -apple-system,system-ui; color:#9a9a9a;\">A<\u002Fdiv>\n          <div style=\"text-align:center;\">\n            <div style=\"font:700 16px -apple-system,system-ui; color:#2b2b2b;\">Alison<\u002Fdiv>\n            <div style=\"font:400 11.5px -apple-system,system-ui; color:#9a9a9a;\">Good morning<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div>\n          <div style=\"font:600 11px -apple-system,system-ui; color:#a8a8a8; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:9px;\">My life<\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:10px;\">\n            <div onclick=\"{{ openHomeUpdates }}\" style=\"border:1px solid #e7e8ea; border-radius:14px; padding:12px; display:flex; flex-direction:column; gap:20px; cursor:pointer;\">\n              <div style=\"width:30px; height:30px; border-radius:9px; background:#eceef0;\"><\u002Fdiv>\n              <div><div style=\"font:600 13px -apple-system,system-ui; color:#2b2b2b;\">Home<\u002Fdiv><div style=\"font:400 11px -apple-system,system-ui; color:#9a9a9a;\">All quiet<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div onclick=\"{{ openHealthUpdates }}\" style=\"border:1px solid #e7e8ea; border-radius:14px; padding:12px; display:flex; flex-direction:column; gap:20px; cursor:pointer;\">\n              <div style=\"width:30px; height:30px; border-radius:9px; background:#e4f3ea; display:flex; align-items:center; justify-content:center; color:#2e9e6b; font:700 13px -apple-system,system-ui;\">♥<\u002Fdiv>\n              <div><div style=\"font:600 13px -apple-system,system-ui; color:#2b2b2b;\">Health<\u002Fdiv><div style=\"font:400 11px -apple-system,system-ui; color:#9a9a9a;\">3 updates<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div onclick=\"{{ openFamilyUpdates }}\" style=\"border:1px solid #e7e8ea; border-radius:14px; padding:12px; display:flex; flex-direction:column; gap:20px; cursor:pointer;\">\n              <div style=\"width:30px; height:30px; border-radius:9px; background:#eceef0;\"><\u002Fdiv>\n              <div><div style=\"font:600 13px -apple-system,system-ui; color:#2b2b2b;\">Family &amp; Friends<\u002Fdiv><div style=\"font:400 11px -apple-system,system-ui; color:#9a9a9a;\">2 reminders<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div onclick=\"{{ openFinanceUpdates }}\" style=\"border:1px solid #e7e8ea; border-radius:14px; padding:12px; display:flex; flex-direction:column; gap:20px; cursor:pointer;\">\n              <div style=\"width:30px; height:30px; border-radius:9px; background:#eceef0;\"><\u002Fdiv>\n              <div><div style=\"font:600 13px -apple-system,system-ui; color:#2b2b2b;\">Finances<\u002Fdiv><div style=\"font:400 11px -apple-system,system-ui; color:#9a9a9a;\">On track<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding-bottom:14px;\">\n          <div style=\"font:600 11px -apple-system,system-ui; color:#a8a8a8; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:9px;\">Recent<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:9px;\">\n            <sc-for list=\"{{ feedCards }}\" as=\"card\" hint-placeholder-count=\"3\">\n              <div onclick=\"{{ card.onClick }}\" style=\"display:flex; align-items:center; gap:11px; padding:12px; border:1px solid #e7e8ea; border-radius:14px; cursor:pointer;\">\n                <div style=\"width:34px; height:34px; border-radius:10px; background:{{ card.iconBg }}; flex:none; display:flex; align-items:center; justify-content:center; color:{{ card.iconFg }}; font:700 13px -apple-system,system-ui;\">{{ card.iconGlyph }}<\u002Fdiv>\n                <div style=\"flex:1; min-width:0;\">\n                  <div style=\"font:600 12.5px -apple-system,system-ui; color:#2b2b2b;\">{{ card.title }}<\u002Fdiv>\n                  <div style=\"font:400 11.5px -apple-system,system-ui; color:#9a9a9a; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ card.preview }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"color:#c2c3c6; font:600 18px -apple-system,system-ui;\">›<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ ASSISTANTS ============ -->\n    <sc-if value=\"{{ isAssistants }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"flex:1; padding:0 18px 14px; overflow-y:auto;\">\n        <div style=\"font:400 12.5px -apple-system,system-ui; color:#9a9a9a; margin-bottom:14px;\">Pick an assistant to chat<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <sc-for list=\"{{ assistantRows }}\" as=\"row\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex; align-items:center; gap:11px; padding:12px; border:1px solid #e7e8ea; border-radius:14px;\">\n              <span style=\"{{ row.avatarStyle }}\">{{ row.glyph }}<\u002Fspan>\n              <div style=\"flex:1; min-width:0;\">\n                <div style=\"font:600 13px -apple-system,system-ui; color:#2b2b2b;\">{{ row.name }}<\u002Fdiv>\n                <div style=\"font:400 11.5px -apple-system,system-ui; color:#9a9a9a;\">{{ row.subtitle }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div onclick=\"{{ row.onChat }}\" style=\"padding:8px 16px; background:#2a2d34; color:#fff; border-radius:10px; font:600 12px -apple-system,system-ui; cursor:pointer;\">Chat<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ CONFIGURATION ============ -->\n    <sc-if value=\"{{ isConfig }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"flex:1; padding:0 18px 14px; overflow-y:auto; display:flex; flex-direction:column; gap:16px;\">\n        <div style=\"display:flex; gap:7px; overflow-x:auto; padding-bottom:2px;\">\n          <sc-for list=\"{{ configPills }}\" as=\"pill\" hint-placeholder-count=\"5\">\n            <div onclick=\"{{ pill.onClick }}\" style=\"{{ pill.style }}\">{{ pill.name }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:0; border:1px solid #e7e8ea; border-radius:14px; overflow:hidden;\">\n          <sc-for list=\"{{ configCapabilities }}\" as=\"cap\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; align-items:center; gap:11px; padding:13px 14px; border-bottom:1px solid #eef0f2;\">\n              <div style=\"flex:1; min-width:0;\">\n                <div style=\"font:600 13px -apple-system,system-ui; color:#2b2b2b;\">{{ cap.label }}<\u002Fdiv>\n                <div style=\"font:400 11px -apple-system,system-ui; color:#9a9a9a;\">{{ cap.sublabel }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div onclick=\"{{ cap.onToggle }}\" style=\"{{ cap.trackStyle }}\"><div style=\"{{ cap.knobStyle }}\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font:400 11.5px/1.4 -apple-system,system-ui; color:#a8a8a8;\">{{ configSelectedName }} only acts with your permission. You can revoke any access at any time.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ ACCESS ============ -->\n    <sc-if value=\"{{ isAccess }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"flex:1; padding:0 18px 14px; overflow-y:auto;\">\n        <div style=\"font:400 12.5px -apple-system,system-ui; color:#9a9a9a; margin-bottom:14px;\">Active grants across your assistants. Revoke any, any time.<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <sc-for list=\"{{ ledgerItems }}\" as=\"item\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex; align-items:center; gap:11px; padding:12px 14px; border:1px solid #e7e8ea; border-radius:14px;\">\n              <div style=\"flex:1; min-width:0;\">\n                <div style=\"font:600 12.5px -apple-system,system-ui; color:#2b2b2b;\">{{ item.assistant }}<\u002Fdiv>\n                <div style=\"font:400 11.5px -apple-system,system-ui; color:#9a9a9a;\">{{ item.label }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div onclick=\"{{ item.onRevoke }}\" style=\"padding:7px 13px; background:#fff; color:#b5493f; border:1px solid #f0d9d6; border-radius:10px; font:600 11.5px -apple-system,system-ui; cursor:pointer;\">Revoke<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ ledgerEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"text-align:center; padding:30px 0; font:400 12.5px -apple-system,system-ui; color:#9a9a9a;\">No active grants.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ DETAIL: ALISON ============ -->\n    <sc-if value=\"{{ isAlison }}\" hint-placeholder-val=\"{{ false }}\">\n      <div ref=\"{{ threadRef }}\" style=\"flex:1; padding:4px 18px 6px; overflow-y:auto; display:flex; flex-direction:column; gap:10px;\">\n        <div style=\"align-self:center; font:500 10.5px -apple-system,system-ui; color:#a8a8a8; text-transform:uppercase; letter-spacing:0.6px; margin:6px 0 2px;\">Today<\u002Fdiv>\n        <div style=\"display:flex; gap:9px; align-items:flex-end;\">\n          <div style=\"width:26px; height:26px; border-radius:50%; background:#eceef0; flex:none;\"><\u002Fdiv>\n          <div style=\"max-width:225px; background:#f1f2f4; border-radius:16px 16px 16px 4px; padding:11px 13px; font:400 13px/1.45 -apple-system,system-ui; color:#3a3a3a;\">\n            Health Coach logged your interval session — Thu 18:00, high intensity.\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:9px; align-items:flex-end;\">\n          <div style=\"width:26px; height:26px; border-radius:50%; background:#eceef0; flex:none;\"><\u002Fdiv>\n          <div style=\"max-width:240px; background:#f1f2f4; border-radius:16px 16px 16px 4px; padding:12px 14px; font:400 13px/1.5 -apple-system,system-ui; color:#3a3a3a;\">\n            <div style=\"margin-bottom:8px;\">Saw your interval session Thu 18:00 from Health Coach. Three things:<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:7px;\">\n              <div style=\"display:flex; gap:8px;\"><span style=\"font:700 12px -apple-system,system-ui; color:#2e9e6b; flex:none;\">1<\u002Fspan><span>Dinner Thu switched to recovery-friendly food the kids will still eat<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; gap:8px;\"><span style=\"font:700 12px -apple-system,system-ui; color:#2e9e6b; flex:none;\">2<\u002Fspan><span>Heads up: it overlaps Leo's football pickup at 18:30<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; gap:8px;\"><span style=\"font:700 12px -apple-system,system-ui; color:#2e9e6b; flex:none;\">3<\u002Fspan><span>Suggest swap with Friday's lighter run<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ ctaPending }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex; gap:9px; justify-content:flex-end; padding:2px 0 2px 35px;\">\n            <div onclick=\"{{ swapFriday }}\" style=\"flex:1; text-align:center; background:#2a2d34; color:#fff; border-radius:12px; padding:12px 0; font:600 13.5px -apple-system,system-ui; cursor:pointer;\">Swap to Friday<\u002Fdiv>\n            <div onclick=\"{{ keepThu }}\" style=\"flex:1; text-align:center; background:#fff; color:#5b5b5b; border:1px solid #d6d7da; border-radius:12px; padding:12px 0; font:600 13.5px -apple-system,system-ui; cursor:pointer;\">Keep<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ ctaSwapped }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex; align-items:center; gap:10px; margin:6px 0 2px;\">\n            <div style=\"flex:1; height:1px; background:#ececef;\"><\u002Fdiv>\n            <div style=\"font:500 11.5px -apple-system,system-ui; color:#9a9a9a; display:flex; align-items:center; gap:5px;\"><span style=\"color:#2e9e6b;\">✓<\u002Fspan> Rescheduled to Friday<\u002Fdiv>\n            <div style=\"flex:1; height:1px; background:#ececef;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:9px; align-items:flex-end;\">\n            <div style=\"width:26px; height:26px; border-radius:50%; background:#eceef0; flex:none;\"><\u002Fdiv>\n            <div style=\"max-width:225px; background:#f1f2f4; border-radius:16px 16px 16px 4px; padding:11px 13px; font:400 13px/1.45 -apple-system,system-ui; color:#3a3a3a;\">Moved Thursday's interval session to Friday ; color:#9a9a9a; cursor:pointer;\">\n              <span style=\"{{ it.boxStyle }}\">{{ it.mark }}<\u002Fspan>{{ it.label }}\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font:400 11.5px -apple-system,system-ui; color:#a8a8a8;\">Scope: this conversation only<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:12px 18px 18px;\">\n        <sc-if value=\"{{ jNotGranted }}\" hint-placeholder-val=\"{{ true }}\">\n          <div onclick=\"{{ grantAccess }}\" style=\"text-align:center; background:#2a2d34; color:#fff; border-radius:13px; padding:13px 0; font:600 14px -apple-system,system-ui; cursor:pointer;\">Grant scoped access<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ jGranted }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex; flex-direction:column; gap:10px;\">\n            <div style=\"border:1px solid #cfe8dc; background:#e9f5ee; border-radius:14px; padding:12px 14px; font:400 12.5px/1.4 -apple-system,system-ui; color:#2b2b2b;\"><strong style=\"color:#2e9e6b;\">Access granted ✓<\u002Fstrong><br>Scoped to this conversation.<\u002Fdiv>\n            <div onclick=\"{{ revokeAccess }}\" style=\"text-align:center; background:#fff; color:#2e9e6b; border:1px solid #cfe8dc; border-radius:13px; padding:11px 0; font:600 13px -apple-system,system-ui; cursor:pointer;\">Revoke access<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ DETAIL: HETTA ============ -->\n    <sc-if value=\"{{ isHetta }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"flex:1; padding:2px 18px 0; overflow-y:auto; display:flex; flex-direction:column; gap:18px;\">\n        <div style=\"font:400 12.5px/1.5 -apple-system,system-ui; color:#9a9a9a;\">Built from six weeks of your own words. Not a form.<\u002Fdiv>\n        <sc-for list=\"{{ profileSections }}\" as=\"sec\" hint-placeholder-count=\"4\">\n          <div>\n            <div style=\"font:600 11px -apple-system,system-ui; color:#a8a8a8; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:5px;\">{{ sec.label }}<\u002Fdiv>\n            <div style=\"font:400 13.5px/1.4 -apple-system,system-ui; color:#2b2b2b;\">{{ sec.value }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"padding:14px 18px 18px; display:flex; flex-direction:column; gap:10px; align-items:center;\">\n        <sc-if value=\"{{ hNotExported }}\" hint-placeholder-val=\"{{ true }}\">\n          <div onclick=\"{{ exportProfile }}\" style=\"width:100%; text-align:center; background:#2a2d34; color:#fff; border-radius:13px; padding:13px 0; font:600 14px -apple-system,system-ui; cursor:pointer;\">Export profile<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ hExported }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"width:100%; text-align:center; background:#e9f5ee; color:#2e9e6b; border:1px solid #cfe8dc; border-radius:13px; padding:13px 0; font:600 14px -apple-system,system-ui;\">Exported ✓<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"font:400 11.5px/1.4 -apple-system,system-ui; color:#a8a8a8; text-align:center;\">Yours to carry anywhere: any coach, human or AI, you choose.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ DETAIL: AXEL ============ -->\n    <sc-if value=\"{{ isAxel }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"flex:1; padding:4px 18px 0; overflow-y:auto; display:flex; flex-direction:column; gap:12px;\">\n        <div style=\"display:flex; justify-content:flex-start;\">\n          <div style=\"max-width:200px;\">\n            <div style=\"font:600 10.5px -apple-system,system-ui; color:#9a9a9a; margin-bottom:3px;\">Marko<\u002Fdiv>\n            <div style=\"background:#f1f2f4; border-radius:16px 16px 16px 4px; padding:11px 13px; font:400 13px/1.45 -apple-system,system-ui; color:#3a3a3a;\">Can't do Thu 18:00.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:9px; align-items:flex-end;\">\n          <div style=\"width:26px; height:26px; border-radius:50%; background:#e4f3ea; display:flex; align-items:center; justify-content:center; color:#2e9e6b; font:700 12px -apple-system,system-ui; flex:none;\">♥<\u002Fdiv>\n          <div style=\"max-width:230px; background:#f1f2f4; border-radius:16px 16px 16px 4px; padding:12px 14px; font:400 13px/1.5 -apple-system,system-ui; color:#3a3a3a;\">\n            <div style=\"margin-bottom:8px;\">Two slots work for both calendars:<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:5px;\">\n              <div><strong style=\"color:#2e9e6b;\">A<\u002Fstrong>&nbsp; Thu 07:00, before work<\u002Fdiv>\n              <div><strong style=\"color:#2e9e6b;\">B<\u002Fstrong>&nbsp; Fri 18:00, usual slot<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ axelPending }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex; gap:8px; justify-content:flex-end; padding:2px 0 2px 35px;\">\n            <div onclick=\"{{ pickA }}\" style=\"flex:1; text-align:center; background:#2a2d34; color:#fff; border-radius:12px; padding:11px 0; font:600 13px -apple-system,system-ui; cursor:pointer;\">A<\u002Fdiv>\n            <div onclick=\"{{ pickB }}\" style=\"flex:1; text-align:center; background:#2a2d34; color:#fff; border-radius:12px; padding:11px 0; font:600 13px -apple-system,system-ui; cursor:pointer;\">B<\u002Fdiv>\n            <div onclick=\"{{ pickNeither }}\" style=\"flex:1; text-align:center; background:#fff; color:#5b5b5b; border:1px solid #d6d7da; border-radius:12px; padding:11px 0; font:600 13px -apple-system,system-ui; cursor:pointer;\">Neither<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ axelBooked }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex; align-items:center; gap:10px; margin:4px 0 2px;\">\n            <div style=\"flex:1; height:1px; background:#ececef;\"><\u002Fdiv>\n            <div style=\"font:500 11.5px -apple-system,system-ui; color:#9a9a9a; display:flex; align-items:center; gap:5px;\"><span style=\"color:#2e9e6b;\">✓<\u002Fspan> Booked, slot {{ axelSlotLabel }}<\u002Fdiv>\n            <div style=\"flex:1; height:1px; background:#ececef;\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ axelNeither }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex; gap:9px; align-items:flex-end;\">\n            <div style=\"width:26px; height:26px; border-radius:50%; background:#e4f3ea; display:flex; align-items:center; justify-content:center; color:#2e9e6b; font:700 12px -apple-system,system-ui; flex:none;\">♥<\u002Fdiv>\n            <div style=\"max-width:225px; background:#f1f2f4; border-radius:16px 16px 16px 4px; padding:11px 13px; font:400 13px/1.45 -apple-system,system-ui; color:#3a3a3a;\">Understood — I'll propose two new slots once both calendars update.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"flex:1;\"><\u002Fdiv>\n        <div style=\"font:400 11px/1.4 -apple-system,system-ui; color:#a8a8a8; padding:6px 0 14px;\">Thread sees joint sessions only. Axel's private health context stays on his side.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:0 16px 18px;\">\n        <div style=\"display:flex; align-items:center; gap:10px; background:#f1f2f4; border-radius:24px; padding:11px 16px;\">\n          <span style=\"flex:1; font:400 13px -apple-system,system-ui; color:#9a9a9a;\">Message the thread…<\u002Fspan>\n          <div style=\"width:27px; height:27px; border-radius:50%; background:#2a2d34; flex:none;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ DETAIL: MAYA ============ -->\n    <sc-if value=\"{{ isMaya }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"flex:1; padding:8px 18px 0; overflow-y:auto;\">\n        <sc-if value=\"{{ mPending }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"border:1px solid #e7e8ea; border-radius:16px; padding:16px; display:flex; flex-direction:column; gap:12px;\">\n            <div style=\"font:400 13px/1.5 -apple-system,system-ui; color:#3a3a3a;\">StreamMax: untouched for two months. Your film talk is all about the cinema season lately.<\u002Fdiv>\n            <div style=\"font:600 14px -apple-system,system-ui; color:#2b2b2b;\">Cancel StreamMax now?<\u002Fdiv>\n            <div style=\"font:400 11.5px -apple-system,system-ui; color:#9a9a9a;\">Scope: this action only<\u002Fdiv>\n            <div onclick=\"{{ toggleRemind }}\" style=\"display:flex; align-items:center; gap:10px; font:400 12.5px -apple-system,system-ui; color:#3a3a3a; cursor:pointer;\">\n              <span style=\"{{ remindBoxStyle }}\">{{ remindMark }}<\u002Fspan>Remind me before LearnPro renews (Mar)\n            <\u002Fdiv>\n            <div style=\"display:flex; gap:9px; margin-top:2px;\">\n              <div onclick=\"{{ cancelStream }}\" style=\"flex:1; text-align:center; background:#2a2d34; color:#fff; border-radius:12px; padding:12px 0; font:600 13.5px -apple-system,system-ui; cursor:pointer;\">Cancel it<\u002Fdiv>\n              <div onclick=\"{{ keepStream }}\" style=\"flex:1; text-align:center; background:#fff; color:#5b5b5b; border:1px solid #d6d7da; border-radius:12px; padding:12px 0; font:600 13.5px -apple-system,system-ui; cursor:pointer;\">Keep<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ mCancelled }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"border:1px solid #cfe8dc; background:#e9f5ee; border-radius:16px; padding:16px; font:400 13px/1.6 -apple-system,system-ui; color:#3a3a3a;\">\n            <strong style=\"color:#2e9e6b;\">StreamMax canceled ✓<\u002Fstrong>\n            <div style=\"margin-top:6px;\">You'll save $12.99/mo.<\u002Fdiv>\n            <sc-if value=\"{{ remindOn }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"margin-top:4px;\">Reminder set for LearnPro's renewal (Mar).<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ mKept }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"border:1px solid #e7e8ea; border-radius:16px; padding:16px; font:400 13px -apple-system,system-ui; color:#9a9a9a;\">Kept StreamMax. No changes made.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"padding:14px 16px 18px;\">\n        <div style=\"display:flex; align-items:center; gap:10px; background:#f1f2f4; border-radius:24px; padding:11px 16px;\">\n          <span style=\"flex:1; font:400 13px -apple-system,system-ui; color:#9a9a9a;\">Message Finance Helper…<\u002Fspan>\n          <div style=\"width:27px; height:27px; border-radius:50%; background:#2a2d34; flex:none;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ DETAIL: HEALTH UPDATES ============ -->\n    <sc-if value=\"{{ isHealthUpdates }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"flex:1; padding:8px 18px 18px; overflow-y:auto; display:flex; flex-direction:column; gap:9px;\">\n        <sc-for list=\"{{ healthUpdateItems }}\" as=\"u\" hint-placeholder-count=\"3\">\n          <div style=\"border:1px solid #e7e8ea; border-radius:14px; padding:13px 14px;\">\n            <div style=\"font:600 12.5px -apple-system,system-ui; color:#2b2b2b;\">{{ u.title }}<\u002Fdiv>\n            <div style=\"font:400 11.5px/1.4 -apple-system,system-ui; color:#9a9a9a; margin-top:3px;\">{{ u.detail }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ DETAIL: FAMILY & FRIENDS UPDATES ============ -->\n    <sc-if value=\"{{ isFamilyUpdates }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"fl a9a9a; margin-top:3px;\">{{ u.detail }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Bottom nav -->\n    <sc-if value=\"{{ inTabs }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex; border-top:1px solid #e7e8ea; padding:8px 6px 12px;\">\n        <div onclick=\"{{ goFeed }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer;\">\n          <div style=\"{{ navFeedDotOuter }}\"><div style=\"{{ navFeedDotInner }}\"><\u002Fdiv><\u002Fdiv>\n          <span style=\"{{ navFeedLabel }}\">Feed<\u002Fspan>\n        <\u002Fdiv>\n        <div onclick=\"{{ goAssistants }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer;\">\n          <div style=\"display:flex;\">\n            <div style=\"{{ navAsstCircle1 }}\"><\u002Fdiv>\n            <div style=\"{{ navAsstCircle2 }}\"><\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"{{ navAsstLabel }}\">Assistants<\u002Fspan>\n        <\u002Fdiv>\n        <div onclick=\"{{ goConfig }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer;\">\n          <div style=\"display:flex; flex-direction:column; gap:2px; width:18px;\">\n            <div style=\"{{ navCfgBar1 }}\"><\u002Fdiv>\n            <div style=\"{{ navCfgBar2 }}\"><\u002Fdiv>\n            <div style=\"{{ navCfgBar3 }}\"><\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"{{ navCfgLabel }}\">Configure<\u002Fspan>\n        <\u002Fdiv>\n        <div onclick=\"{{ goAccess }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer;\">\n          <div style=\"{{ navAccessOuter }}\"><div style=\"{{ navAccessInner }}\"><\u002Fdiv><\u002Fdiv>\n          <span style=\"{{ navAccessLabel }}\">Access<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst REPLIES = [\n  \"Got it — I'll factor that in and keep the rest of the week balanced.\",\n  \"Noted. I'll check in with Health Coach before anything else changes.\",\n  \"Good to know — I'll keep Leo's schedule clear going forward.\",\n  \"Understood, I'll hold off unless something else comes up.\",\n];\n\nconst ASSISTANTS = [\n  { id: 'homehelper', name: 'Home Helper', subtitle: 'Tasks, groceries & errands', accent: false, view: 'alison', glyph: '⌂', bg: '#eceef0', fg: '#8a8a8a' },\n  { id: 'healthcoach', name: 'Health Coach', subtitle: 'Nutrition & training plan', accent: true, view: 'axel', glyph: '♥', bg: '#e4f3ea', fg: '#2e9e6b' },\n  { id: 'companion', name: 'Companion', subtitle: 'Reflection & relationships', accent: false, view: 'jo', glyph: '◐', bg: '#eceef0', fg: '#8a8a8a' },\n  { id: 'career', name: 'Career Coach', subtitle: 'Growth & opportunities', accent: false, view: 'hetta', glyph: '↗', bg: '#eceef0', fg: '#8a8a8a' },\n  { id: 'finance', name: 'Finance Helper', subtitle: 'Subscriptions & spending', accent: false, view: 'maya', glyph: '$', bg: '#eceef0', fg: '#8a8a8a' },\n];\nconst ASSISTANT_BY_VIEW = ASSISTANTS.reduce((m, a) => { m[a.view] = a; return m; }, {});\n\nconst CAPABILITIES = {\n  homehelper: [\n    { key: 'health', label: 'Health data', sublabel: 'Activity & nutrition' },\n    { key: 'shopping', label: 'Shopping & orders', sublabel: 'Place grocery orders' },\n    { key: 'calendar', label: 'Calendar & reminders', sublabel: 'Create reminders' },\n    { key: 'whatsapp', label: 'Messaging (WhatsApp)', sublabel: 'Send reminders & nudges' },\n    { key: 'contacts', label: 'Contacts', sublabel: '' },\n  ],\n  healthcoach: [\n    { key: 'healthdata', label: 'Health & fitness data', sublabel: 'Appointments, activity' },\n    { key: 'calendar', label: 'Calendar', sublabel: 'Book & reschedule' },\n    { key: 'messaging', label: 'Messaging', sublabel: 'WhatsApp reminders' },\n  ],\n  companion: [\n    { key: 'scoped', label: 'Scoped chat context', sublabel: 'What you explicitly share' },\n    { key: 'fullhistory', label: 'Full conversation history', sublabel: '' },\n  ],\n  career: [\n    { key: 'conversations', label: 'Career conversations', sublabel: 'Values, skills, goals' },\n    { key: 'calendar', label: 'Calendar', sublabel: 'Interview scheduling' },\n  ],\n  finance: [\n    { key: 'subscriptions', label: 'Subscriptions & spending', sublabel: 'Flag & cancel' },\n    { key: 'accounts', label: 'Bank accounts', sublabel: 'Read balances & transactions' },\n    { key: 'messaging', label: 'Messaging', sublabel: 'Renewal reminders' },\n  ],\n};\n\nconst DEFAULT_TOGGLES = {\n  homehelper: { health: true, shopping: true, calendar: true, whatsapp: true, contacts: false },\n  healthcoach: { healthdata: true, calendar: true, messaging: false },\n  companion: { scoped: true, fullhistory: false },\n  career: { conversations: true, calendar: false },\n  finance: { subscriptions: true, accounts: true, messaging: false },\n};\n\nconst TAB_TITLES = { feed: 'My Life', assistants: 'Assistants', config: 'Configuration', access: 'Access' };\nconst DETAIL_TITLES = { alison: 'Home Helper', jo: 'Companion', hetta: 'Career Coach', axel: 'Health Coach + Marko', maya: 'Finance Helper', healthUpdates: 'Health', familyUpdates: 'Family & Friends', homeUpdates: 'Home', financeUpdates: 'Finances' };\n\nclass Component extends DCLogic {\n  state = {\n    view: 'feed',\n    returnTo: 'feed',\n    configSelected: 'homehelper',\n    toggles: JSON.parse(JSON.stringify(DEFAULT_TOGGLES)),\n    aCta: 'pending',\n    aInput: '',\n    aMessages: [],\n    jIncluded: [true, true],\n    jPrivate: [false, false, false],\n    jGranted: false,\n    hExported: false,\n    mRemind: true,\n    mStatus: 'pending',\n    axelSlot: null,\n    viewportWidth: typeof window !== 'undefined' ? window.innerWidth : 1024,\n  };\n\n  threadRef = React.createRef();\n  componentDidUpdate() {\n    const el = this.threadRef.current;\n    if (el) el.scrollTop = el.scrollHeight;\n  }\n\n  componentDidMount() {\n    this.onResize = () => this.setState({ viewportWidth: window.innerWidth });\n    window.addEventListener('resize', this.onResize);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('resize', this.onResize);\n  }\n\n  goFeed = () => this.setState({ view: 'feed' });\n  goAssistants = () => this.setState({ view: 'assistants' });\n  goConfig = () => this.setState({ view: 'config' });\n  goAccess = () => this.setState({ view: 'access' });\n  goBack = () => this.setState(s => ({ view: s.returnTo }));\n  openDetail = (view, returnTo) => this.setState({ view, returnTo });\n  openHealthUpdates = () => this.openDetail('healthUpdates', 'feed');\n  openFamilyUpdates = () => this.openDetail('familyUpdates', 'feed');\n  openHomeUpdates = () => this.openDetail('homeUpdates', 'feed');\n  openFinanceUpdates = () => this.openDetail('financeUpdates', 'feed');\n\n  swapFriday = () => this.setState({ aCta: 'swapped' });\n  keepThu = () => this.setState({ aCta: 'kept' });\n  onInputChange = (e) => this.setState({ aInput: e.target.value });\n  onInputKeyDown = (e) => { if (e.key === 'Enter') { e.preventDefault(); this.sendMessage(); } };\n  sendMessage = () => {\n    const text = this.state.aInput.trim();\n    if (!text) return;\n    this.setState(s => ({ aMessages: [...s.aMessages, { isUser: true, isAssistant: false, text }], aInput: '' }));\n    const replyIndex = this.state.aMessages.filter(m => m.isUser).length % REPLIES.length;\n    setTimeout(() => {\n      this.setState(s => ({ aMessages: [...s.aMessages, { isUser: false, isAssistant: true, text: REPLIES[replyIndex] }] }));\n    }, 700);\n  };\n\n  toggleIncluded = (i) => this.setState(s => { const a = s.jIncluded.slice(); a[i] = !a[i]; return { jIncluded: a }; });\n  togglePrivate = (i) => this.setState(s => { const a = s.jPrivate.slice(); a[i] = !a[i]; return { jPrivate: a }; });\n  grantAccess = () => this.setSta
