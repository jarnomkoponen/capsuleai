<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>* { box-sizing: border-box; -webkit-font-smoothing: antialiased; } body { margin: 0; }</style>
</helmet>
<dc-import name="UniversalCanvasModule" hint-size="100%,100%">
  <div style="flex:1;display:flex;flex-direction:column;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI',system-ui,sans-serif;">
    <div style="display:flex;align-items:center;justify-content:center;gap:10px;padding:8px 0 14px;border-bottom:1px solid #D9D9DD;">
      <dc-import name="LogoModule" size="header" hint-size="26px,26px"></dc-import>
      <span style="font-size:17px;line-height:22px;font-weight:600;color:#17171A;">Assistant setup</span>
    </div>
    <div style="padding:20px 20px 28px;display:flex;flex-direction:column;gap:24px;">
      <dc-import name="ConnectionConfirmModule" assistant="Home helper" targetName="Google Calendar" rights="see, edit and modify events" efficiencyBefore="35" efficiencyAfter="55" on-start-chat="{{ onStartChat }}" hint-size="100%,560px"></dc-import>
      <dc-import name="ProgressIndicatorModule" current="3" total="3" label="Step 3 of 3" hint-size="100%,60px"></dc-import>
    </div>
  </div>
</dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:880}}"></script>
</body>
</html>
