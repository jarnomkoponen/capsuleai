<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
*{box-sizing:border-box}html,body{margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",system-ui,sans-serif;background:#EAEAE6;color:#1A1A1A;-webkit-font-smoothing:antialiased}
a{color:#2E5AAC;text-decoration:none}a:hover{text-decoration:underline;color:#22447f}
</style>
</helmet>
<div style="max-width:460px;margin:0 auto;padding:16px">
  <header role="banner" style="position:relative;display:flex;align-items:center;gap:8px;min-height:56px;background:transparent;padding:6px 4px">

    <sc-if value="{{ showLogo }}" hint-placeholder-val="{{ true }}">
      <div aria-label="Capsule" role="img" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;pointer-events:none">
        <span style="font-size:22px;line-height:1;font-weight:700;color:#1A1A1A;letter-spacing:-0.03em">(o)</span>
      </div>
    </sc-if>

    <sc-if value="{{ showBack }}" hint-placeholder-val="{{ false }}">
      <button aria-label="Go back" onClick="{{ back }}" style="width:44px;height:44px;flex:none;border:none;background:transparent;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#1A1A1A" style-hover="background:#F4F4F1">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"></path></svg>
      </button>
    </sc-if>

    <sc-if value="{{ showTitle }}" hint-placeholder-val="{{ false }}">
      <h1 style="font-size:17px;line-height:22px;font-weight:600;margin:0;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ title }}</h1>
    </sc-if>

    <sc-if value="{{ showStartChat }}" hint-placeholder-val="{{ true }}">
      <button onClick="{{ startChat }}" aria-label="{{ startChatLabel }}" style="min-height:44px;display:flex;align-items:center;gap:6px;padding:0 10px;border:none;background:transparent;color:#1A1A1A;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit" style-hover="background:#F4F4F1">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"></path></svg>
        Chat
      </button>
    </sc-if>

    <div style="flex:1"></div>

    <sc-if value="{{ showNotif }}" hint-placeholder-val="{{ false }}">
      <button aria-label="{{ notifLabel }}" onClick="{{ notifAction }}" style="width:44px;height:44px;flex:none;position:relative;border:none;background:transparent;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#1A1A1A" style-hover="background:#F4F4F1">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.7 21a2 2 0 0 1-3.4 0"></path></svg>
        <sc-if value="{{ hasUnread }}" hint-placeholder-val="{{ false }}">
          <span aria-hidden="true" style="position:absolute;top:7px;right:7px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:#C0342B;color:#FFFFFF;font-size:10px;font-weight:700;line-height:16px;text-align:center">{{ notifCount }}</span>
        </sc-if>
      </button>
    </sc-if>

  </header>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 492, &quot;height&quot;: 100 },
  &quot;variant&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;home&quot;, &quot;chat&quot;, &quot;section&quot;], &quot;default&quot;: &quot;home&quot;, &quot;tsType&quot;: &quot;'home'|'chat'|'section'&quot; },
  &quot;title&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Health coach&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;notifCount&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 3, &quot;min&quot;: 0, &quot;max&quot;: 99, &quot;tsType&quot;: &quot;number&quot; },
  &quot;startChatLabel&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Start chat&quot;, &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    const variant = this.props.variant ?? 'home';
    const title = this.props.title ?? 'Health coach';
    const notifCount = this.props.notifCount ?? 3;
    const startChatLabel = this.props.startChatLabel ?? 'Start chat';
    const noop = () => {};
    const isHome = variant === 'home';
    const isChat = variant === 'chat';
    const isSection = variant === 'section';
    return {
      title, startChatLabel, notifCount,
      showBack: isChat || isSection,
      showLogo: isHome || isChat,
      showTitle: isChat || isSection,
      showNotif: notifCount >= 0 && (this.props.notifications ?? true),
      hasUnread: notifCount > 0,
      notifLabel: notifCount > 0 ? (notifCount + ' unread notifications') : 'Notifications',
      showStartChat: isHome,
      back: this.props.back || noop,
      notifAction: this.props.notifAction || noop,
      startChat: this.props.startChat || noop,
    };
  }
}
</script>
</body>
</html>
