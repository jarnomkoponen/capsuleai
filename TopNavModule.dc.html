<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { margin: 0; }
  .tn-btn:focus-visible { outline: 2px solid #0F766E; outline-offset: 2px; }
</style>
</helmet>
<header role="banner" style="font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI',system-ui,sans-serif;background:#FFFFFF;">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;min-height:52px;padding:6px 12px;">

    <!-- LEFT -->
    <div style="display:flex;align-items:center;min-width:64px;">
      <sc-if value="{{ showChatPill }}" hint-placeholder-val="{{ true }}">
        <button type="button" class="tn-btn" onClick="{{ onChat }}" aria-label="Start a chat" style="display:inline-flex;align-items:center;gap:6px;min-height:40px;padding:0 14px;border:none;border-radius:20px;background:#17171A;box-shadow:0 4px 16px rgba(23,23,26,0.14);color:#FFFFFF;font:600 15px/1 inherit;cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 20l1.2-4.2L15 6a2.1 2.1 0 013 3l-9.8 9.8L4 20z" stroke="#FFFFFF" stroke-width="1.8" stroke-linejoin="round"/></svg>
          <span style="color:#FFFFFF;">Chat</span>
        </button>
      </sc-if>
      <sc-if value="{{ showHomeBtn }}" hint-placeholder-val="{{ false }}">
        <button type="button" class="tn-btn" onClick="{{ onHome }}" aria-label="Home" style="display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border:1px solid #D9D9DD;border-radius:50%;background:rgba(255,255,255,0.82);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);box-shadow:0 4px 16px rgba(23,23,26,0.10);cursor:pointer;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 11l8-6 8 6M6 10v9h12v-9" stroke="#17171A" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/></svg>
        </button>
      </sc-if>
      <sc-if value="{{ showBack }}" hint-placeholder-val="{{ false }}">
        <button type="button" class="tn-btn" onClick="{{ onBack }}" aria-label="Back" style="display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border:1px solid #D9D9DD;border-radius:50%;background:rgba(255,255,255,0.82);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);box-shadow:0 4px 16px rgba(23,23,26,0.10);cursor:pointer;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15 5l-7 7 7 7" stroke="#0F766E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </sc-if>
    </div>

    <!-- CENTER -->
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;flex:1;min-width:0;">
      <sc-if value="{{ showLogoMark }}" hint-placeholder-val="{{ true }}">
        <span aria-hidden="true" style="font-size:19px;line-height:1;font-weight:600;letter-spacing:-0.03em;color:#17171A;flex:none;">(o)</span>
      </sc-if>
      <h1 style="margin:0;font-size:17px;line-height:22px;font-weight:600;color:#17171A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ title }}</h1>
    </div>

    <!-- RIGHT -->
    <div style="display:flex;align-items:center;justify-content:flex-end;min-width:64px;">
      <sc-if value="{{ showBell }}" hint-placeholder-val="{{ true }}">
        <button type="button" class="tn-btn" onClick="{{ onBell }}" aria-label="{{ bellLabel }}" style="position:relative;display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border:1px solid #D9D9DD;border-radius:50%;background:rgba(255,255,255,0.82);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);box-shadow:0 4px 16px rgba(23,23,26,0.10);cursor:pointer;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 16V10a6 6 0 0112 0v6l1.5 2H4.5L6 16z" stroke="#17171A" stroke-width="1.8" stroke-linejoin="round"/><path d="M10 21h4" stroke="#17171A" stroke-width="1.8" stroke-linecap="round"/></svg>
          <sc-if value="{{ hasUnread }}" hint-placeholder-val="{{ false }}">
            <span aria-hidden="true" style="position:absolute;top:1px;right:1px;min-width:19px;height:19px;padding:0 5px;border-radius:10px;background:#0F766E;color:#FFFFFF;font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;border:2px solid #FFFFFF;box-sizing:border-box;font-variant-numeric:tabular-nums;">{{ unread }}</span>
          </sc-if>
        </button>
      </sc-if>
    </div>
  </div>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:72},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;home&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;chat&quot;,&quot;section&quot;,&quot;back&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Home&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showLogo&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;showBell&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;unread&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:2,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const variant = this.props.variant || 'home';
    const unread = this.props.unread ?? 0;
    const hasUnread = unread > 0;
    const showBell = this.props.showBell ?? true;
    return {
      title: this.props.title || (variant === 'home' ? 'Home' : ''),
      showChatPill: variant === 'home',
      showHomeBtn: variant === 'chat' || variant === 'section',
      showBack: variant === 'back',
      showLogoMark: this.props.showLogo ?? (variant !== 'home'),
      showBell,
      hasUnread,
      unread: unread > 9 ? '9+' : String(unread),
      bellLabel: hasUnread ? ('Notifications, ' + unread + ' unread') : 'Notifications',
      onChat: this.props.onChat || (() => {}),
      onBack: this.props.onBack || (() => {}),
      onHome: this.props.onHome || this.props.onBack || (() => {}),
      onBell: this.props.onBell || (() => {}),
    };
  }
}
</script>
</body>
</html>
