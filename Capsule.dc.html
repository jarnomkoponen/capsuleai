<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>* { box-sizing: border-box; } body { margin: 0; background: #ECECEE; }</style>
</helmet>
<div style="min-height:100vh;">
  <sc-if value="{{ isSignin }}" hint-placeholder-val="{{ false }}"><dc-import name="SignIn" on-next="{{ toOnboarding }}" hint-size="100%,100vh"></dc-import></sc-if>
  <sc-if value="{{ isOnboarding }}" hint-placeholder-val="{{ false }}"><dc-import name="Onboarding" on-next="{{ toOnboardingSetup }}" hint-size="100%,100vh"></dc-import></sc-if>
  <sc-if value="{{ isOnboardingSetup }}" hint-placeholder-val="{{ false }}"><dc-import name="OnboardingAssistantSetup" on-finish="{{ toChatHubOnboarding }}" on-back="{{ toOnboarding }}" hint-size="100%,100vh"></dc-import></sc-if>
  <sc-if value="{{ isSetupDetail }}" hint-placeholder-val="{{ false }}"><dc-import name="AssistantSetupDetail" on-start-chat="{{ toChatHubOnboarding }}" hint-size="100%,100vh"></dc-import></sc-if>

  <sc-if value="{{ isHome }}" hint-placeholder-val="{{ true }}"><dc-import name="Home" on-nav="{{ onNav }}" on-bell="{{ toNotifications }}" on-chat="{{ toChatHub }}" on-start-chat="{{ toChatFresh }}" hint-size="100%,100vh"></dc-import></sc-if>
  <sc-if value="{{ isAssistants }}" hint-placeholder-val="{{ false }}"><dc-import name="Assistants" on-nav="{{ onNav }}" on-bell="{{ toNotifications }}" on-chat="{{ toChatHub }}" on-open-chat="{{ toChat }}" on-open-settings="{{ toSettings }}" hint-size="100%,100vh"></dc-import></sc-if>
  <sc-if value="{{ isYou }}" hint-placeholder-val="{{ false }}"><dc-import name="You" on-nav="{{ onNav }}" on-bell="{{ toNotifications }}" on-chat="{{ toChatHub }}" on-manage-access="{{ toAssistantsTab }}" on-log-out="{{ toSignin }}" on-delete-account="{{ toSignin }}" hint-size="100%,100vh"></dc-import></sc-if>
  <sc-if value="{{ isChatHub }}" hint-placeholder-val="{{ false }}"><dc-import name="ChatHub" mode="{{ chatHubMode }}" on-back="{{ onBack }}" on-home="{{ toHome }}" on-bell="{{ toNotifications }}" on-nav="{{ onNav }}" on-open-chat="{{ toChat }}" on-open-settings="{{ toSettings }}" hint-size="100%,100vh"></dc-import></sc-if>
  <sc-if value="{{ isNotifications }}" hint-placeholder-val="{{ false }}"><dc-import name="Notifications" on-back="{{ onBack }}" on-home="{{ toHome }}" on-nav="{{ onNav }}" on-task="{{ toChatSeed }}" hint-size="100%,100vh"></dc-import></sc-if>
  <sc-if value="{{ isChat }}" hint-placeholder-val="{{ false }}"><dc-import name="Chat" assistant="{{ chatAssistant }}" fresh="{{ chatFresh }}" seed="{{ chatSeed }}" on-back="{{ onBack }}" on-home="{{ toHome }}" on-bell="{{ toNotifications }}" hint-size="100%,100vh"></dc-import></sc-if>
  <sc-if value="{{ isAssistantIndividual }}" hint-placeholder-val="{{ false }}"><dc-import name="AssistantIndividual" on-back="{{ onBack }}" on-home="{{ toHome }}" hint-size="100%,100vh"></dc-import></sc-if>
  <sc-if value="{{ isAssistantSettings }}" hint-placeholder-val="{{ false }}"><dc-import name="AssistantSettings" assistant="{{ settingsAssistant }}" on-back="{{ onBack }}" on-home="{{ toHome }}" on-start-chat="{{ toChatFromSettings }}" hint-size="100%,100vh"></dc-import></sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:880}}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    const valid = ['signin','onboarding','onboardingsetup','setupdetail','home','assistants','you','notifications','chathub','chat','assistantindividual','assistantsettings'];
    let start = 'home';
    try {
      const h = (window.location.hash || '').replace('#','').toLowerCase();
      if (valid.includes(h)) start = h;
    } catch (e) {}
    this.state = { screen: start, hist: [], chatAssistant: 'Health coach', chatHubMode: 'normal', settingsAssistant: 'Home helper', chatFresh: false, chatSeed: '' };
  }
  go(s) { this.setState((p) => ({ screen: s, hist: [...p.hist, p.screen] })); }
  back() { this.setState((p) => { const h = [...p.hist]; const prev = h.pop() || 'home'; return { screen: prev, hist: h }; }); }
  renderVals() {
    const s = this.state.screen;
    const tabMap = { home: 'home', assistants: 'assistants', you: 'you' };
    const rv = {
      isSignin: s === 'signin', isOnboarding: s === 'onboarding', isOnboardingSetup: s === 'onboardingsetup',
      isSetupDetail: s === 'setupdetail', isHome: s === 'home', isAssistants: s === 'assistants', isYou: s === 'you',
      isNotifications: s === 'notifications', isChatHub: s === 'chathub', isChat: s === 'chat',
      isAssistantIndividual: s === 'assistantindividual', isAssistantSettings: s === 'assistantsettings',
      chatAssistant: this.state.chatAssistant,
      chatFresh: this.state.chatFresh,
      chatSeed: this.state.chatSeed,
      chatHubMode: this.state.chatHubMode,
      settingsAssistant: this.state.settingsAssistant,
      onNav: (label) => this.go(tabMap[String(label).toLowerCase()] || 'home'),
      onBack: () => this.back(),
      toHome: () => this.go('home'),
      toSignin: () => this.setState({ screen: 'signin', hist: [] }),
      toAssistantsTab: () => this.go('assistants'),
      toChat: (a) => {
        const name = a && (a.name || a.label || a.assistant) ? (a.name || a.label || a.assistant) : null;
        const fresh = this.state.chatHubMode === 'onboarding';
        this.setState((p) => ({ chatAssistant: name || p.chatAssistant, chatFresh: fresh, chatSeed: '' }));
        this.go('chat');
      },
      onHubOpen: (a) => {
        if (this.state.chatHubMode === 'onboarding') { rv.toSettings(a); }
        else { rv.toChat(a); }
      },
      toChatHub: () => { this.setState({ chatHubMode: 'normal' }); this.go('chathub'); },
      toChatHubOnboarding: () => { this.setState({ chatHubMode: 'onboarding' }); this.go('chathub'); },
      toNotifications: () => this.go('notifications'),
      toSettings: (a) => {
        const name = a && (a.name || a.label || a.assistant) ? (a.name || a.label || a.assistant) : null;
        this.setState((p) => ({ settingsAssistant: name || p.settingsAssistant }));
        this.go('assistantsettings');
      },
      toChatSeed: (t) => {
        this.setState({ chatSeed: (t && t.id) || '', chatFresh: false });
        this.go('chat');
      },
      toChatFresh: (a) => {
        const name = a && (a.name || a.label || a.assistant) ? (a.name || a.label || a.assistant) : null;
        this.setState((p) => ({ chatAssistant: name || p.chatAssistant, chatFresh: true, chatSeed: '' }));
        this.go('chat');
      },
      toChatFromSettings: () => {
        this.setState((p) => ({ chatAssistant: p.settingsAssistant, chatFresh: true, chatSeed: '' }));
        this.go('chat');
      },
      toOnboarding: () => this.go('onboarding'),
      toOnboardingSetup: () => this.go('onboardingsetup'),
      toSetupDetail: () => this.go('setupdetail'),
    };
    return rv;
  }
}
</script>
</body>
</html>
