<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
*{box-sizing:border-box}html,body{margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",system-ui,sans-serif;background:#EAEAE6;color:#1A1A1A;-webkit-font-smoothing:antialiased}
</style>
</helmet>
<div style="max-width:460px;margin:0 auto;padding:16px">
  <section aria-label="Recent chats">
    <div style="display:flex;align-items:center;justify-content:space-between;margin:0 0 10px">
      <span style="font-size:13px;font-weight:600;color:#454541">Recent chats</span>
      <sc-if value="{{ hasSeeMore }}" hint-placeholder-val="{{ false }}">
        <button onClick="{{ seeMore }}" style="min-height:44px;background:transparent;border:none;color:#2E5AAC;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;padding:0">See more</button>
      </sc-if>
    </div>

    <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ false }}">
      <div style="background:#FFFFFF;border:1px solid #E4E3DF;border-radius:16px;padding:18px;text-align:center;font-size:15px;color:#454541">No recent chats yet.</div>
    </sc-if>

    <sc-if value="{{ isPopulated }}" hint-placeholder-val="{{ true }}">
      <div role="list" style="border-radius:16px;background:#FFFFFF;border:1px solid #E4E3DF;overflow:hidden">
        <sc-for list="{{ rows }}" as="c" hint-placeholder-count="3">
          <button role="listitem" onClick="{{ c.action }}" aria-label="{{ c.aria }}" style="display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:transparent;border:none;border-top:1px solid #F0EEF5;padding:12px 14px;cursor:pointer;font-family:inherit;min-height:{{ minH }}" style-hover="background:#F7F9FD">
            <span aria-hidden="true" style="width:{{ avSize }};height:{{ avSize }};flex:none;border-radius:50%;background:{{ c.tint }};color:{{ c.ink }};display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700">{{ c.initial }}</span>
            <span style="flex:1;min-width:0">
              <span style="display:flex;align-items:center;gap:7px"><span style="font-size:16px;line-height:21px;font-weight:600;color:#1A1A1A">{{ c.assistant }}</span><sc-if value="{{ c.unread }}" hint-placeholder-val="{{ false }}"><span style="font-size:11px;font-weight:700;color:#FFFFFF;background:#2E5AAC;border-radius:999px;padding:1px 7px">New</span></sc-if></span>
              <span style="display:block;font-size:15px;line-height:20px;color:#454541;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ c.preview }}</span>
            </span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8A8A82" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style="flex:none"><path d="M9 6l6 6-6 6"></path></svg>
          </button>
        </sc-for>
      </div>
    </sc-if>
  </section>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 492, &quot;height&quot;: 300 },
  &quot;variant&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;assistant-view&quot;,&quot;home&quot;], &quot;default&quot;: &quot;assistant-view&quot;, &quot;tsType&quot;: &quot;'home'|'assistant-view'&quot; },
  &quot;chats&quot;: { &quot;editor&quot;: null, &quot;default&quot;: [{&quot;id&quot;:&quot;c1&quot;,&quot;assistant&quot;:&quot;Home helper&quot;,&quot;preview&quot;:&quot;Moved Thursday\u2019s session to Friday&quot;,&quot;unread&quot;:true,&quot;route&quot;:&quot;alison&quot;},{&quot;id&quot;:&quot;c2&quot;,&quot;assistant&quot;:&quot;Health coach&quot;,&quot;preview&quot;:&quot;Your recovery-day plan is ready&quot;,&quot;unread&quot;:false,&quot;route&quot;:&quot;becca&quot;},{&quot;id&quot;:&quot;c3&quot;,&quot;assistant&quot;:&quot;Financial coach&quot;,&quot;preview&quot;:&quot;Found a subscription you don\u2019t use&quot;,&quot;unread&quot;:false,&quot;route&quot;:&quot;maya&quot;}], &quot;tsType&quot;: &quot;{ id: string; assistant: string; preview: string; action: Action }[]&quot; }
}">
class Component extends DCLogic {
  renderVals(){
    const variant = this.props.variant ?? 'assistant-view';
    const tints = { alison:['#EEE9F6','#4B2E83'], becca:['#EAF0FA','#2E5AAC'], jo:['#E8F0EC','#1E7A46'], maya:['#FBF1E6','#8A5A00'] };
    const def = [
      { id:'c1', assistant:'Home helper', preview:'Moved Thursday\u2019s session to Friday', unread:true, route:'alison' },
      { id:'c2', assistant:'Health coach', preview:'Your recovery-day plan is ready', unread:false, route:'becca' },
      { id:'c3', assistant:'Financial coach', preview:'Found a subscription you don\u2019t use', unread:false, route:'maya' },
    ];
    const raw = Array.isArray(this.props.chats) && this.props.chats.length ? this.props.chats : def;
    const noop = () => {};
    const rows = raw.map(c => {
      const t = tints[c.route] || ['#EEEDEA','#454541'];
      return {
        assistant:c.assistant, preview:c.preview, unread:!!c.unread,
        initial:(c.assistant||'?')[0], tint:t[0], ink:t[1],
        aria: c.assistant + '. ' + c.preview + (c.unread ? '. Unread.' : ''),
        action:c.action || noop,
      };
    });
    return {
      rows, isEmpty: rows.length === 0, isPopulated: rows.length > 0,
      avSize: variant === 'assistant-view' ? '36px' : '30px',
      minH: variant === 'assistant-view' ? '64px' : '56px',
      hasSeeMore: (this.props.seeMore ?? true) !== false,
      seeMore: this.props.seeMore || noop,
    };
  }
}
</script>
</body>
</html>
