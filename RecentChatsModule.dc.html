<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { margin: 0; }
  .rc-row:focus-visible, .rc-more:focus-visible { outline: 2px solid #0F766E; outline-offset: 2px; }
</style>
</helmet>
<section aria-label="Recent chats" style="font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI',system-ui,sans-serif;">
  <h2 style="margin:0 0 12px;font-size:15px;line-height:20px;font-weight:700;color:#17171A;">Recent chats</h2>
  <ul style="list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:10px;">
    <sc-for list="{{ chats }}" as="c" hint-placeholder-count="4">
      <li>
        <button type="button" class="rc-row" onClick="{{ c.action }}" aria-label="{{ c.aria }}" style="width:100%;text-align:left;display:flex;align-items:center;gap:12px;min-height:52px;padding:12px 14px;border:1px solid #D9D9DD;border-radius:12px;background:#FFFFFF;cursor:pointer;">
          <span style="flex:1;min-width:0;">
            <span style="display:block;font-size:16px;line-height:21px;color:#17171A;"><strong style="font-weight:600;">{{ c.assistant }}:</strong> {{ c.preview }}</span>
          </span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="flex:none;"><path d="M9 6l6 6-6 6" stroke="#B8B8BF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </li>
    </sc-for>
  </ul>
  <sc-if value="{{ hasMore }}" hint-placeholder-val="{{ false }}">
    <button type="button" class="rc-more" onClick="{{ onSeeMore }}" style="display:block;margin:14px auto 0;appearance:none;border:none;background:transparent;color:#6E6E77;font:400 15px/1 inherit;cursor:pointer;min-height:44px;">See more</button>
  </sc-if>
</section>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:320},&quot;seeMore&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const raw = this.props.chats || [
      { id: 'c1', assistant: 'Home helper', preview: 'family dinner on Thu' },
      { id: 'c2', assistant: 'Health coach', preview: 'recovery progress' },
      { id: 'c3', assistant: 'Companion', preview: 'prepping for school conversation' },
      { id: 'c4', assistant: 'Home helper', preview: 'training schedules' },
    ];
    const onOpen = this.props.onOpen || (() => {});
    const chats = raw.map((c) => ({
      assistant: c.assistant, preview: c.preview,
      aria: c.assistant + ', ' + c.preview,
      action: () => onOpen(c),
    }));
    return {
      chats,
      hasMore: this.props.seeMore ?? false,
      onSeeMore: this.props.onSeeMore || (() => {}),
    };
  }
}
</script>
</body>
</html>
