<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>* { box-sizing: border-box; -webkit-font-smoothing: antialiased; } body { margin: 0; }</style>
</helmet>
<div style="font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:flex-end;gap:4px;max-width:88%;margin-left:auto;">
  <span style="font-size:12px;line-height:16px;font-weight:600;color:#6E6E77;padding-right:4px;">You</span>
  <div style="background:{{ bubbleBg }};border:1px solid {{ bubbleBorder }};border-radius:16px 4px 16px 16px;padding:12px 16px;">
    <p style="margin:0;font-size:17px;line-height:24px;color:#17171A;">{{ body }}</p>
  </div>
  <div style="display:flex;align-items:center;gap:6px;padding-right:4px;">
    <sc-if value="{{ isFailed }}" hint-placeholder-val="{{ false }}">
      <span aria-hidden="true" style="width:15px;height:15px;border-radius:50%;background:#B3261E;color:#FFFFFF;font-size:10px;font-weight:800;line-height:15px;text-align:center;">!</span>
      <span style="font-size:12px;line-height:16px;color:#B3261E;font-weight:600;">Not sent — tap to retry</span>
    </sc-if>
    <sc-if value="{{ isSending }}" hint-placeholder-val="{{ false }}">
      <span style="font-size:12px;line-height:16px;color:#6E6E77;">Sending…</span>
    </sc-if>
    <sc-if value="{{ hasTime }}" hint-placeholder-val="{{ false }}">
      <span style="font-size:12px;line-height:16px;color:#B8B8BF;">{{ timestamp }}</span>
    </sc-if>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:120},&quot;body&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Sounds good, hold the Thursday slot.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;status&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;sent&quot;,&quot;options&quot;:[&quot;sent&quot;,&quot;sending&quot;,&quot;failed&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;timestamp&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const status = this.props.status || 'sent';
    return {
      body: this.props.body || 'Sounds good, hold the Thursday slot.',
      timestamp: this.props.timestamp || '',
      hasTime: !!this.props.timestamp && status === 'sent',
      isFailed: status === 'failed',
      isSending: status === 'sending',
      bubbleBg: '#ECECEE',
      bubbleBorder: '#D9D9DD',
    };
  }
}
</script>
</body>
</html>
