<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
*{box-sizing:border-box}html,body{margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",system-ui,sans-serif;background:#D8D8D3;color:#1A1A1A;-webkit-font-smoothing:antialiased}
</style>
</helmet>
<div style="max-width:440px;margin:0 auto;min-height:100vh;background:#F4F4F1;display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,0.06)">
  <main role="main" style="display:flex;flex-direction:column;flex:1;min-height:0">
    <div style="position:sticky;top:0;z-index:5;background:#F4F4F1;padding-bottom:2px">
      <dc-import name="TopNavModule" variant="chat" back="{{ onBack }}" title="Career coach" hint-size="100%,88px"></dc-import>
    </div>
    <div role="log" aria-live="polite" aria-label="Career conversation with your Career coach" style="flex:1;overflow:auto;display:flex;flex-direction:column;gap:2px;padding-bottom:8px">
      <dc-import name="AssistantMessageModule"
        assistant="Career coach"
        status="Six weeks of our sessions, remembered"
        body="Here's the profile we've built together. It's yours to take anywhere \u2014 export it whenever you like."
        hint-size="100%,170px"></dc-import>
      <dc-import name="ChatCanvasModule" variant="visualization" vizTitle="Your career profile" exportLabel="Export profile" hint-size="100%,620px"></dc-import>
    </div>
    <div style="position:sticky;bottom:0;background:linear-gradient(to top,#F4F4F1 70%,rgba(244,244,241,0));padding-top:4px">
      <dc-import name="ChatBoxModule" context="assistant" placeholder="Message your Career coach" hint-size="100%,92px"></dc-import>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 440, &quot;height&quot;: 900 } }"></script>
</body>
</html>
