<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { margin: 0; }
  .cb-btn:focus-visible, .cb-input:focus-visible { outline: 2px solid #0F766E; outline-offset: 2px; }
  .cb-input::placeholder { color: #6E6E77; }
</style>
</helmet>
<div style="font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI',system-ui,sans-serif;padding:10px 12px;background:#FFFFFF;border-top:1px solid #ECECEE;">
  <div style="display:flex;align-items:center;gap:8px;border:1px solid #D9D9DD;border-radius:26px;padding:4px 6px 4px 8px;">
    <sc-if value="{{ showUpload }}" hint-placeholder-val="{{ true }}">
      <button type="button" class="cb-btn" onClick="{{ onUpload }}" aria-label="Add attachment" style="flex:none;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;border-radius:50%;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="#17171A" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </sc-if>
    <input type="text" class="cb-input" aria-label="{{ inputLabel }}" placeholder="{{ placeholder }}" value="{{ value }}" onInput="{{ onInput }}" onKeyDown="{{ onKeyDown }}" style="flex:1;min-width:0;border:none;outline:none;background:transparent;font:400 17px/1.3 inherit;color:#17171A;padding:10px 4px;" />
    <sc-if value="{{ showVoice }}" hint-placeholder-val="{{ true }}">
      <button type="button" class="cb-btn" onClick="{{ onVoice }}" aria-label="Voice input" style="flex:none;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;border-radius:50%;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="9" y="3" width="6" height="12" rx="3" stroke="#17171A" stroke-width="1.8"/><path d="M5 11a7 7 0 0014 0M12 18v3" stroke="#17171A" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </sc-if>
    <button type="button" class="cb-btn" onClick="{{ onSend }}" aria-label="Send message" style="flex:none;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border:none;background:{{ accent }};cursor:pointer;border-radius:50%;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12h13M12 5l7 7-7 7" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:80},&quot;context&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;assistant&quot;,&quot;options&quot;:[&quot;onboarding&quot;,&quot;assistant&quot;,&quot;search&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;assistant&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Home helper&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#0F766E&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#0F766E&quot;,&quot;#2563C9&quot;,&quot;#C2410C&quot;]}}">
class Component extends DCLogic {
  state = { text: '' };
  send() {
    const t = this.state.text.trim();
    if (!t) return;
    (this.props.onSend || (() => {}))(t);
    this.setState({ text: '' });
  }
  renderVals() {
    const context = this.props.context || 'assistant';
    const assistant = this.props.assistant || 'Home helper';
    const placeholders = {
      onboarding: 'Tell me what is on your mind',
      assistant: 'Message ' + assistant,
      search: 'Search',
    };
    const placeholder = this.props.placeholder || placeholders[context];
    return {
      placeholder,
      inputLabel: 'Message input',
      accent: this.props.accent || '#0F766E',
      showUpload: context === 'assistant',
      showVoice: context === 'onboarding' || context === 'assistant',
      onUpload: this.props.onUpload || (() => {}),
      onVoice: this.props.onVoice || (() => {}),
      value: this.state.text,
      onInput: (e) => this.setState({ text: e.target.value }),
      onKeyDown: (e) => { if (e.key === 'Enter') { e.preventDefault(); this.send(); } },
      onSend: () => this.send(),
    };
  }
}
</script>
</body>
</html>
