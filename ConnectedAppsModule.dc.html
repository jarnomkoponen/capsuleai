<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { margin: 0; }
  .ca-switch:focus-visible, .ca-add:focus-visible { outline: 3px solid #0F766E; outline-offset: 2px; }
</style>
</helmet>
<section aria-label="Access and connections" style="font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI',system-ui,sans-serif;">
  <h2 style="margin:0 0 4px;font-size:15px;line-height:20px;font-weight:700;color:#17171A;">Access &amp; connections</h2>
  <p style="margin:0 0 14px;font-size:14px;line-height:20px;color:#3A3A40;">You control every connection. Turn any source off at any time.</p>

  <ul style="list-style:none;margin:0;padding:0;border:1px solid #D9D9DD;border-radius:14px;overflow:hidden;">
    <sc-for list="{{ connections }}" as="c" hint-placeholder-count="4">
      <li style="display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid #ECECEE;">
        <span style="flex:1;min-width:0;">
          <span style="display:block;font-size:17px;line-height:22px;color:#17171A;">{{ c.name }}</span>
          <sc-if value="{{ c.hasScope }}" hint-placeholder-val="{{ false }}">
            <span id="{{ c.scopeId }}" style="display:block;font-size:13px;line-height:18px;color:#6E6E77;margin-top:2px;">{{ c.scope }}</span>
          </sc-if>
          <span style="display:block;font-size:13px;line-height:18px;font-weight:600;color:{{ c.stateColor }};margin-top:2px;">{{ c.stateText }}</span>
        </span>
        <button type="button" role="switch" class="ca-switch" aria-checked="{{ c.checked }}" aria-label="{{ c.name }}" aria-describedby="{{ c.scopeId }}" onClick="{{ c.onToggle }}" style="flex:none;position:relative;width:52px;height:32px;border-radius:16px;border:1px solid {{ c.trackBorder }};background:{{ c.trackBg }};cursor:pointer;padding:0;transition:background .15s;">
          <span aria-hidden="true" style="position:absolute;top:3px;left:{{ c.knobLeft }};width:24px;height:24px;border-radius:50%;background:#FFFFFF;border:1px solid #D9D9DD;transition:left .15s;"></span>
        </button>
      </li>
    </sc-for>
  </ul>

  <div aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;">{{ announce }}</div>

  <button type="button" class="ca-add" onClick="{{ onAdd }}" style="display:inline-flex;align-items:center;gap:8px;margin-top:14px;min-height:48px;padding:0 18px;border:1px solid #17171A;border-radius:24px;background:#FFFFFF;color:#17171A;font:600 16px/1 inherit;cursor:pointer;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="#0F766E" stroke-width="2" stroke-linecap="round"/></svg>
    Add access or connection
  </button>
</section>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:360},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#0F766E&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#0F766E&quot;,&quot;#2563C9&quot;,&quot;#C2410C&quot;]}}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    const init = (this.props.connections || this.defaults()).map((c) => ({ ...c }));
    this.state = { conns: init, announce: '' };
  }
  defaults() {
    return [
      { id: 'gcal', name: 'Google Calendar', connected: true, scope: 'See and add events' },
      { id: 'gmail', name: 'Google Mail', connected: true, scope: 'Read receipts and confirmations' },
      { id: 'ebay', name: 'eBay', connected: false, scope: 'List and manage items' },
      { id: 'bank', name: 'My bank app', connected: false, scope: 'Read balances and subscriptions' },
    ];
  }
  toggle(id) {
    this.setState((s) => {
      const conns = s.conns.map((c) => c.id === id ? { ...c, connected: !c.connected } : c);
      const c = conns.find((x) => x.id === id);
      return { conns, announce: c.name + ', ' + (c.connected ? 'connected' : 'disconnected') };
    });
    if (this.props.onToggle) this.props.onToggle(id);
  }
  renderVals() {
    const accent = this.props.accent || '#0F766E';
    const connections = this.state.conns.map((c) => ({
      name: c.name,
      scope: c.scope, hasScope: !!c.scope, scopeId: 'scope-' + c.id,
      checked: c.connected ? 'true' : 'false',
      stateText: c.connected ? 'Connected' : 'Not connected',
      stateColor: c.connected ? '#3A3A40' : '#6E6E77',
      trackBg: c.connected ? accent : '#ECECEE',
      trackBorder: c.connected ? accent : '#D9D9DD',
      knobLeft: c.connected ? '25px' : '3px',
      onToggle: () => this.toggle(c.id),
    }));
    return { connections, announce: this.state.announce, onAdd: this.props.onAdd || (() => {}) };
  }
}
</script>
</body>
</html>
