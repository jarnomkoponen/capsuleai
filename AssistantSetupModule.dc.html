<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>* { box-sizing: border-box; -webkit-font-smoothing: antialiased; } body { margin: 0; }</style>
</helmet>
<section aria-label="{{ regionLabel }}" style="font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;gap:16px;">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
    <span style="font-size:20px;line-height:25px;font-weight:700;letter-spacing:-0.01em;color:#17171A;">{{ assistant }}</span>
    <dc-import name="EfficiencyMeterModule" variant="inline" assistant="" value="{{ efficiency }}" delta="{{ delta }}" accent="{{ accent }}" hint-size="120px,44px"></dc-import>
  </div>
  <dc-import name="TopicVisualizationModule" variant="hero" kind="{{ vizKind }}" topic="{{ topic }}" caption="{{ caption }}" accent="{{ accent }}" hint-size="100%,200px"></dc-import>
</section>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:300},&quot;assistant&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Home helper&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;topic&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Home&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;efficiency&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:35,&quot;min&quot;:0,&quot;max&quot;:100,&quot;step&quot;:1,&quot;unit&quot;:&quot;%&quot;,&quot;tsType&quot;:&quot;number&quot;},&quot;delta&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:0,&quot;tsType&quot;:&quot;number&quot;},&quot;vizKind&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;trend&quot;,&quot;options&quot;:[&quot;trend&quot;,&quot;rings&quot;,&quot;bars&quot;,&quot;image&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;caption&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;onboarding&quot;,&quot;options&quot;:[&quot;onboarding&quot;,&quot;settings&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#0F766E&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#0F766E&quot;,&quot;#2563C9&quot;,&quot;#C2410C&quot;]}}">
class Component extends DCLogic {
  renderVals() {
    const assistant = this.props.assistant || 'Home helper';
    return {
      assistant,
      topic: this.props.topic || 'Home',
      accent: this.props.accent || '#0F766E',
      efficiency: this.props.efficiency ?? 35,
      delta: this.props.delta ?? 0,
      vizKind: this.props.vizKind || 'trend',
      caption: this.props.caption || 'How ' + assistant + ' helps in this area, getting smarter as you connect more.',
      regionLabel: assistant + ' setup',
    };
  }
}
</script>
</body>
</html>
