<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { margin: 0; }
  .as-name:focus-visible, .as-gear:focus-visible, .as-more:focus-visible { outline: 2px solid #0F766E; outline-offset: 2px; }
</style>
</helmet>
<section aria-label="Your assistants" style="font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI',system-ui,sans-serif;">
  <h2 style="margin:0 0 12px;font-size:15px;line-height:20px;font-weight:700;color:#17171A;">Your assistants</h2>
  <ul style="list-style:none;margin:0;padding:0;border:1px solid #D9D9DD;border-radius:14px;overflow:hidden;">
    <sc-for list="{{ assistants }}" as="a" hint-placeholder-count="5">
      <li style="display:flex;align-items:stretch;border-bottom:1px solid #ECECEE;">
        <button type="button" class="as-name" onClick="{{ a.onChat }}" aria-label="{{ a.chatAria }}" style="flex:1;min-width:0;text-align:left;display:flex;align-items:center;gap:12px;min-height:56px;padding:12px 8px 12px 16px;border:none;background:#FFFFFF;cursor:pointer;">
          <span aria-hidden="true" style="width:34px;height:34px;border-radius:50%;background:#F7F7F8;border:1px solid #ECECEE;flex:none;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#3A3A40;">{{ a.initial }}</span>
          <span style="font-size:17px;line-height:22px;font-weight:500;color:#17171A;">{{ a.name }}</span>
        </button>
        <button type="button" class="as-gear" onClick="{{ a.onSettings }}" aria-label="{{ a.settingsAria }}" style="flex:none;width:56px;display:flex;align-items:center;justify-content:center;border:none;border-left:1px solid #ECECEE;background:#FFFFFF;cursor:pointer;">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="2.6" stroke="#6E6E77" stroke-width="1.5"/><path d="M12 4v2.2M12 17.8V20M20 12h-2.2M6.2 12H4M17.66 6.34l-1.56 1.56M7.9 16.1l-1.56 1.56M17.66 17.66l-1.56-1.56M7.9 7.9L6.34 6.34" stroke="#6E6E77" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </li>
    </sc-for>
  </ul>
  <button type="button" class="as-more" onClick="{{ onExplore }}" style="display:inline-flex;align-items:center;gap:6px;margin-top:14px;min-height:44px;padding:0 16px;border:1px solid #D9D9DD;border-radius:22px;background:#FFFFFF;color:#17171A;font:600 15px/1 inherit;cursor:pointer;"><span aria-hidden="true" style="font-size:18px;line-height:1;color:#0F766E;">+</span> Explore more</button>
</section>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:420}}">
class Component extends DCLogic {
  renderVals() {
    const raw = this.props.assistants || [
      { id: 'home', name: 'Home helper' },
      { id: 'health', name: 'Health coach' },
      { id: 'training', name: 'Training buddy' },
      { id: 'companion', name: 'Companion' },
      { id: 'finance', name: 'Financial coach' },
    ];
    const onChat = this.props.onChat || (() => {});
    const onSettings = this.props.onSettings || (() => {});
    const assistants = raw.map((a) => ({
      name: a.name,
      initial: a.name.charAt(0),
      chatAria: 'Open chat with ' + a.name,
      settingsAria: a.name + ' settings',
      onChat: () => onChat(a),
      onSettings: () => onSettings(a),
    }));
    return { assistants, onExplore: this.props.onExplore || (() => {}) };
  }
}
</script>
</body>
</html>
