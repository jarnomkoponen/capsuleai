<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
*{box-sizing:border-box}html,body{margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",system-ui,sans-serif;background:#EAEAE6;color:#1A1A1A;-webkit-font-smoothing:antialiased}
</style>
</helmet>
<div style="max-width:460px;margin:0 auto;padding:16px">
  <section aria-label="Your assistants">
    <div style="font-size:13px;font-weight:600;color:#454541;margin:0 0 10px">Your assistants</div>

    <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ false }}">
      <div style="background:#FFFFFF;border:1px solid #E4E3DF;border-radius:16px;padding:20px;text-align:center">
        <div style="font-size:17px;line-height:22px;font-weight:600;margin-bottom:2px">No assistants yet</div>
        <div style="font-size:15px;line-height:20px;color:#454541">Explore more to add your first.</div>
      </div>
    </sc-if>

    <sc-if value="{{ isPopulated }}" hint-placeholder-val="{{ true }}">
      <div role="list" style="display:flex;flex-direction:column;gap:10px">
        <sc-for list="{{ rows }}" as="a" hint-placeholder-count="4">
          <div role="listitem" style="display:flex;align-items:center;gap:12px;background:#FFFFFF;border:1px solid #E4E3DF;border-radius:16px;padding:10px 10px 10px 14px">
            <span aria-hidden="true" style="width:40px;height:40px;flex:none;border-radius:50%;background:{{ a.tint }};color:{{ a.ink }};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700">{{ a.initial }}</span>
            <button onClick="{{ a.chat }}" aria-label="{{ a.chatLabel }}" style="flex:1;min-width:0;min-height:44px;display:flex;flex-direction:column;justify-content:center;text-align:left;background:transparent;border:none;cursor:pointer;font-family:inherit;padding:0">
              <span style="font-size:17px;line-height:22px;font-weight:600;color:#1A1A1A">{{ a.name }}</span>
              <span style="font-size:14px;line-height:19px;color:#454541">{{ a.role }}</span>
            </button>
            <button onClick="{{ a.settings }}" aria-label="{{ a.settingsLabel }}" style="width:44px;height:44px;flex:none;border:none;background:transparent;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#454541" style-hover="background:#F4F4F1">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H10a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V10a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"></path></svg>
            </button>
            <button onClick="{{ a.chat }}" aria-label="{{ a.openLabel }}" style="width:44px;height:44px;flex:none;border:none;background:#EAF0FA;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#2E5AAC" style-hover="background:#DCE8F8">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4L3 21l1.1-4.5A8.4 8.4 0 1 1 21 11.5z"></path></svg>
            </button>
          </div>
        </sc-for>
      </div>
    </sc-if>

    <sc-if value="{{ showExplore }}" hint-placeholder-val="{{ true }}">
      <button onClick="{{ exploreMore }}" style="margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;min-height:52px;background:#FFFFFF;border:1.5px dashed #C7C7C1;border-radius:16px;cursor:pointer;font-family:inherit;color:#2E5AAC;font-size:16px;font-weight:600" style-hover="border-color:#2E5AAC;background:#F7F9FD">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
        Explore more
      </button>
    </sc-if>
  </section>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 492, &quot;height&quot;: 460 },
  &quot;assistants&quot;: { &quot;editor&quot;: null, &quot;default&quot;: [{&quot;id&quot;:&quot;alison&quot;,&quot;name&quot;:&quot;Home helper&quot;,&quot;role&quot;:&quot;Coordinates your family &amp; home&quot;,&quot;initial&quot;:&quot;H&quot;},{&quot;id&quot;:&quot;becca&quot;,&quot;name&quot;:&quot;Health coach&quot;,&quot;role&quot;:&quot;Your recovery-day plan&quot;,&quot;initial&quot;:&quot;H&quot;},{&quot;id&quot;:&quot;jo&quot;,&quot;name&quot;:&quot;Companion&quot;,&quot;role&quot;:&quot;Here to think things through&quot;,&quot;initial&quot;:&quot;C&quot;},{&quot;id&quot;:&quot;maya&quot;,&quot;name&quot;:&quot;Financial coach&quot;,&quot;role&quot;:&quot;Keeps an eye on your money&quot;,&quot;initial&quot;:&quot;F&quot;}], &quot;tsType&quot;: &quot;{ id: string; name: string; role?: string; icon?: string; settings: Action; chat: Action }[]&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    const tints = { alison:['#EEE9F6','#4B2E83'], becca:['#EAF0FA','#2E5AAC'], jo:['#E8F0EC','#1E7A46'], maya:['#FBF1E6','#8A5A00'] };
    const noop = () => {};
    const def = [
      { id:'alison', name:'Home helper', role:'Coordinates your family & home', initial:'H' },
      { id:'becca', name:'Health coach', role:'Your recovery-day plan', initial:'H' },
      { id:'jo', name:'Companion', role:'Here to think things through', initial:'C' },
      { id:'maya', name:'Financial coach', role:'Keeps an eye on your money', initial:'F' },
    ];
    const raw = Array.isArray(this.props.assistants) && this.props.assistants.length ? this.props.assistants : def;
    const rows = raw.map(a => {
      const t = tints[a.id] || ['#EEEDEA','#454541'];
      return {
        name:a.name, role:a.role || '', initial:a.initial || (a.name||'?')[0],
        tint:t[0], ink:t[1],
        chat:a.chat || noop, settings:a.settings || noop,
        chatLabel:a.name + '. ' + (a.role||''),
        openLabel:'Open chat with ' + a.name,
        settingsLabel:a.name + ' settings',
      };
    });
    return {
      rows,
      isEmpty: rows.length === 0,
      isPopulated: rows.length > 0,
      showExplore: (this.props.exploreMore ?? true) !== false,
      exploreMore: this.props.exploreMore || noop,
    };
  }
}
</script>
</body>
</html>
