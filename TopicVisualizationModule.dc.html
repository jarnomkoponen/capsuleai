<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>* { box-sizing: border-box; } body { margin: 0; }</style>
</helmet>
<figure role="img" aria-label="{{ textAlt }}" style="margin:0;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI',system-ui,sans-serif;border:1px solid #D9D9DD;border-radius:14px;background:#FFFFFF;overflow:hidden;display:flex;flex-direction:column;">
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:16px;min-height:{{ vizH }};">

    <sc-if value="{{ isTrend }}" hint-placeholder-val="{{ true }}">
      <svg viewBox="0 0 200 90" preserveAspectRatio="none" width="100%" height="{{ vizH }}" aria-hidden="true" style="display:block;">
        <line x1="0" y1="30" x2="200" y2="30" stroke="#ECECEE" stroke-width="1"/>
        <line x1="0" y1="60" x2="200" y2="60" stroke="#ECECEE" stroke-width="1"/>
        <path d="M0 70 L34 62 L68 66 L100 44 L134 40 L168 22 L200 16" fill="none" stroke="{{ accent }}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M0 70 L34 62 L68 66 L100 44 L134 40 L168 22 L200 16 L200 90 L0 90 Z" fill="{{ accent }}" fill-opacity="0.08"/>
      </svg>
    </sc-if>

    <sc-if value="{{ isRings }}" hint-placeholder-val="{{ false }}">
      <svg width="{{ ringSize }}" height="{{ ringSize }}" viewBox="0 0 120 120" aria-hidden="true" style="transform:rotate(-90deg);">
        <circle cx="60" cy="60" r="50" fill="none" stroke="#ECECEE" stroke-width="10"/>
        <circle cx="60" cy="60" r="50" fill="none" stroke="{{ accent }}" stroke-width="10" stroke-linecap="round" stroke-dasharray="314" stroke-dashoffset="88"/>
        <circle cx="60" cy="60" r="34" fill="none" stroke="#ECECEE" stroke-width="10"/>
        <circle cx="60" cy="60" r="34" fill="none" stroke="#6E6E77" stroke-width="10" stroke-linecap="round" stroke-dasharray="214" stroke-dashoffset="120"/>
      </svg>
    </sc-if>

    <sc-if value="{{ isBars }}" hint-placeholder-val="{{ false }}">
      <svg viewBox="0 0 200 90" width="100%" height="{{ vizH }}" aria-hidden="true" style="display:block;">
        <rect x="8" y="46" width="26" height="44" rx="3" fill="#D9D9DD"/>
        <rect x="46" y="30" width="26" height="60" rx="3" fill="#D9D9DD"/>
        <rect x="84" y="54" width="26" height="36" rx="3" fill="#D9D9DD"/>
        <rect x="122" y="18" width="26" height="72" rx="3" fill="{{ accent }}"/>
        <rect x="160" y="38" width="26" height="52" rx="3" fill="#D9D9DD"/>
      </svg>
    </sc-if>

    <sc-if value="{{ isImage }}" hint-placeholder-val="{{ false }}">
      <div style="width:100%;height:{{ vizH }};display:flex;align-items:center;justify-content:center;background:#F7F7F8;color:#6E6E77;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2" stroke="#B8B8BF" stroke-width="1.6"/><circle cx="8.5" cy="9.5" r="1.6" fill="#B8B8BF"/><path d="M5 18l5-5 3 3 3-4 3 4" stroke="#B8B8BF" stroke-width="1.6" stroke-linejoin="round"/></svg>
      </div>
    </sc-if>

  </div>
  <sc-if value="{{ showCaption }}" hint-placeholder-val="{{ true }}">
    <figcaption style="padding:10px 14px;border-top:1px solid #ECECEE;font-size:14px;line-height:20px;color:#3A3A40;">{{ caption }}</figcaption>
  </sc-if>
</figure>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:320,&quot;height&quot;:220},&quot;topic&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Health&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;kind&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;trend&quot;,&quot;options&quot;:[&quot;trend&quot;,&quot;rings&quot;,&quot;bars&quot;,&quot;image&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;card&quot;,&quot;options&quot;:[&quot;hero&quot;,&quot;card&quot;,&quot;inline&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;caption&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Recovery trending up over the last six weeks&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;textAlt&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#0F766E&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#0F766E&quot;,&quot;#2563C9&quot;,&quot;#C2410C&quot;]}}">
class Component extends DCLogic {
  renderVals() {
    const variant = this.props.variant || 'card';
    const kind = this.props.kind || 'trend';
    const accent = this.props.accent || '#0F766E';
    const heights = { hero: '150px', card: '110px', inline: '80px' };
    const ringSizes = { hero: 120, card: 96, inline: 72 };
    const caption = this.props.caption || '';
    return {
      accent,
      isTrend: kind === 'trend', isRings: kind === 'rings', isBars: kind === 'bars', isImage: kind === 'image',
      vizH: heights[variant] || heights.card,
      ringSize: (ringSizes[variant] || 96) + 'px',
      caption, showCaption: !!caption,
      textAlt: this.props.textAlt || caption || (this.props.topic ? (this.props.topic + ' status visualization') : 'Topic status visualization'),
    };
  }
}
</script>
</body>
</html>
