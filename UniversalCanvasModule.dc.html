<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { margin: 0; }
  .uc-scroll::-webkit-scrollbar { width: 0; }
  @media (max-width:520px){
    .cap-stage{padding:0 !important;background:#FFFFFF !important;}
    .cap-phone{width:100% !important;max-width:none !important;height:100vh !important;height:100dvh !important;border-radius:0 !important;border:none !important;padding-top:env(safe-area-inset-top,0) !important;}
    .cap-fakestatus{display:none !important;}
  }
</style>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
</helmet>
<div class="cap-stage" style="font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;{{ backdropStyle }}">
  <div class="cap-phone" style="width:390px;max-width:100%;background:{{ surface }};{{ frameStyle }}display:flex;flex-direction:column;overflow:hidden;">

    <sc-if value="{{ showStatusBar }}" hint-placeholder-val="{{ true }}">
      <div class="cap-fakestatus" style="display:flex;align-items:center;justify-content:space-between;padding:12px 26px 4px;flex:none;background:{{ surface }};">
        <span style="font-size:15px;font-weight:600;color:#17171A;">9:41</span>
        <span aria-hidden="true" style="display:flex;gap:6px;align-items:center;"><svg width="18" height="12" viewBox="0 0 18 12" fill="#17171A"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg><svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 10.4a1.15 1.15 0 100-2.3 1.15 1.15 0 000 2.3z" fill="#17171A"/><path d="M3.6 6.4a6.2 6.2 0 018.8 0M1.2 4a9.7 9.7 0 0113.6 0" stroke="#17171A" stroke-width="1.4" stroke-linecap="round"/></svg><svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="0.6" y="0.6" width="22" height="11.8" rx="3" stroke="#17171A" stroke-width="1.2"/><rect x="2.6" y="2.6" width="14.5" height="7.8" rx="1.5" fill="#17171A"/><path d="M24.4 4.3c1 .5 1 3.9 0 4.4" stroke="#17171A" stroke-width="1.4" stroke-linecap="round"/></svg></span>
      </div>
    </sc-if>

    <main role="main" class="uc-scroll" style="flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;">
      {{ children }}
    </main>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:880},&quot;framed&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;statusBar&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;surface&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#FFFFFF&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const framed = this.props.framed ?? true;
    const height = this.props.height || 812;
    return {
      children: this.props.children,
      surface: this.props.surface || '#FFFFFF',
      showStatusBar: this.props.statusBar ?? true,
      backdropStyle: framed ? 'min-height:100vh;background:#ECECEE;padding:24px 12px;' : 'min-height:100vh;',
      frameStyle: framed
        ? ('height:' + height + 'px;border-radius:44px;border:1px solid #D9D9DD;')
        : 'min-height:100vh;',
    };
  }
}
</script>
</body>
</html>
