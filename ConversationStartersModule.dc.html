<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
*{box-sizing:border-box}html,body{margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",system-ui,sans-serif;background:#EAEAE6;color:#1A1A1A;-webkit-font-smoothing:antialiased}
@keyframes capsuleShimmer{0%{opacity:.55}50%{opacity:1}100%{opacity:.55}}
@media (prefers-reduced-motion: reduce){.capsule-skel{animation:none !important}}
</style>
</helmet>
<div style="max-width:460px;margin:0 auto;padding:16px">
  <div role="group" aria-label="{{ groupLabel }}">
    <div style="font-size:13px;font-weight:600;color:#454541;margin:0 0 10px">{{ groupLabel }}</div>

    <sc-if value="{{ isLoading }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;flex-direction:column;gap:10px">
        <div aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)">Preparing suggestions</div>
        <div class="capsule-skel" style="height:52px;border-radius:14px;background:#EDEDE8;animation:capsuleShimmer 1.4s ease-in-out infinite"></div>
        <div class="capsule-skel" style="height:52px;border-radius:14px;background:#EDEDE8;animation:capsuleShimmer 1.4s ease-in-out infinite;animation-delay:.2s"></div>
        <div class="capsule-skel" style="height:52px;border-radius:14px;background:#EDEDE8;animation:capsuleShimmer 1.4s ease-in-out infinite;animation-delay:.4s"></div>
      </div>
    </sc-if>

    <sc-if value="{{ isReady }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex;flex-direction:column;gap:10px">
        <sc-for list="{{ starters }}" as="s" hint-placeholder-count="3">
          <button onClick="{{ s.action }}" style="display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;min-height:52px;text-align:left;background:#FFFFFF;border:1.5px solid #C9D4E8;border-radius:14px;padding:12px 14px;cursor:pointer;font-family:inherit" style-hover="border-color:#2E5AAC;background:#F7F9FD">
            <span style="font-size:17px;line-height:22px;color:#1A1A1A;font-weight:500">{{ s.label }}</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2E5AAC" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style="flex:none"><path d="M5 12h14"></path><path d="M13 6l6 6-6 6"></path></svg>
          </button>
        </sc-for>
      </div>
    </sc-if>

    <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ false }}">
      <button onClick="{{ fallbackAction }}" style="display:flex;align-items:center;gap:12px;width:100%;min-height:52px;text-align:left;background:#FFFFFF;border:1.5px solid #C9D4E8;border-radius:14px;padding:12px 14px;cursor:pointer;font-family:inherit">
        <span style="font-size:17px;line-height:22px;color:#1A1A1A;font-weight:500">Tell me what's on your mind</span>
      </button>
    </sc-if>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 492, &quot;height&quot;: 260 },
  &quot;assistant&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Companion&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;firstTime&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; },
  &quot;state&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;ready&quot;, &quot;loading&quot;, &quot;empty&quot;], &quot;default&quot;: &quot;ready&quot;, &quot;tsType&quot;: &quot;'loading'|'ready'|'empty'|'dismissed'&quot; },
  &quot;starters&quot;: { &quot;editor&quot;: null, &quot;default&quot;: [{&quot;label&quot;: &quot;Something\u2019s been on my mind about a relationship&quot;}, {&quot;label&quot;: &quot;Help me untangle how I\u2019m feeling&quot;}, {&quot;label&quot;: &quot;I want to understand myself a bit better&quot;}], &quot;tsType&quot;: &quot;{ id?: string; label: string; action?: Action }[]&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    const assistant = this.props.assistant ?? 'Companion';
    const firstTime = this.props.firstTime ?? true;
    const state = this.props.state ?? 'ready';
    const noop = () => {};
    const raw = Array.isArray(this.props.starters) && this.props.starters.length ? this.props.starters : [
      { label: 'Something\u2019s been on my mind about a relationship' },
      { label: 'Help me untangle how I\u2019m feeling' },
      { label: 'I want to understand myself a bit better' },
    ];
    const starters = raw.slice(0, 4).map(s => ({ label: s.label, action: s.action || noop }));
    const groupLabel = firstTime
      ? ('Ways to start with your ' + assistant)
      : ('Pick up with your ' + assistant);
    return {
      groupLabel,
      starters,
      isLoading: state === 'loading',
      isReady: state === 'ready',
      isEmpty: state === 'empty',
      fallbackAction: this.props.fallbackAction || noop,
    };
  }
}
</script>
</body>
</html>
