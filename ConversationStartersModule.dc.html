<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { margin: 0; }
  @keyframes csShimmer { 0%,100% { opacity: 0.5; } 50% { opacity: 0.9; } }
  @media (prefers-reduced-motion: reduce) { .cs-skel { animation: none !important; } }
  .cs-btn:focus-visible { outline: 2px solid #0F766E; outline-offset: 2px; }
</style>
</helmet>
<sc-if value="{{ visible }}" hint-placeholder-val="{{ true }}">
<div role="group" aria-label="{{ groupLabel }}" style="font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;gap:8px;align-items:flex-start;">

  <sc-if value="{{ isLoading }}" hint-placeholder-val="{{ false }}">
    <div aria-live="polite" style="display:flex;flex-direction:column;gap:8px;width:100%;">
      <span style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);">Preparing suggestions</span>
      <span class="cs-skel" style="height:44px;width:70%;border-radius:22px;background:#ECECEE;animation:csShimmer 1.4s ease-in-out infinite;"></span>
      <span class="cs-skel" style="height:44px;width:55%;border-radius:22px;background:#ECECEE;animation:csShimmer 1.4s ease-in-out infinite .2s;"></span>
      <span class="cs-skel" style="height:44px;width:62%;border-radius:22px;background:#ECECEE;animation:csShimmer 1.4s ease-in-out infinite .4s;"></span>
    </div>
  </sc-if>

  <sc-if value="{{ isReady }}" hint-placeholder-val="{{ true }}">
    <sc-for list="{{ starters }}" as="s" hint-placeholder-count="3">
      <button type="button" class="cs-btn" onClick="{{ s.action }}" style="appearance:none;border:none;background:#17171A;color:#FFFFFF;font:600 15px/1.3 inherit;min-height:44px;padding:10px 18px;border-radius:22px;cursor:pointer;text-align:left;max-width:100%;">{{ s.label }}</button>
    </sc-for>
  </sc-if>

</div>
</sc-if>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:220},&quot;placement&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;chat&quot;,&quot;options&quot;:[&quot;chat&quot;,&quot;home&quot;,&quot;assistant&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;assistant&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Companion&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;firstTime&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;status&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;ready&quot;,&quot;options&quot;:[&quot;loading&quot;,&quot;ready&quot;,&quot;empty&quot;,&quot;dismissed&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { dismissed: false };
  renderVals() {
    const placement = this.props.placement || 'chat';
    const assistant = this.props.assistant || 'Companion';
    const firstTime = this.props.firstTime ?? true;
    const status = this.props.status || 'ready';
    const raw = this.props.starters || [
      { id: 's1', label: 'What is something you keep turning over in your mind?' },
      { id: 's2', label: 'Tell me about a relationship you want to understand better' },
      { id: 's3', label: 'Help me put words to how I have been feeling' },
    ];
    const onStarter = this.props.onStarter || (() => {});
    const starters = raw.map((s) => ({ label: s.label, action: () => onStarter(s) }));
    const lead = firstTime ? 'Ways to start with your ' : 'Pick up with your ';
    return {
      visible: !this.state.dismissed && status !== 'dismissed',
      starters,
      isLoading: status === 'loading',
      isReady: status === 'ready' || status === 'empty',
      groupLabel: lead + assistant,
    };
  }
}
</script>
</body>
</html>
