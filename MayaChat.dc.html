<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
*{box-sizing:border-box}html,body{margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",system-ui,sans-serif;background:#D8D8D3;color:#1A1A1A;-webkit-font-smoothing:antialiased}
</style>
</helmet>
<div style="max-width:440px;margin:0 auto;min-height:100vh;background:#F4F4F1;display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,0.06)">
  <main role="main" style="display:flex;flex-direction:column;flex:1;min-height:0">

    <!-- slot: top-nav -> TopNavModule (variant: chat) {0} -->
    <div style="position:sticky;top:0;z-index:5;background:#F4F4F1;padding-bottom:2px">
      <dc-import name="TopNavModule" variant="chat" back="{{ onBack }}" title="Financial coach" hint-size="100%,88px"></dc-import>
    </div>

    <!-- slot: chat -> ChatModule (role=log stream) {1} -->
    <div role="log" aria-live="polite" aria-label="Finance conversation with your Financial coach" style="flex:1;overflow:auto;display:flex;flex-direction:column;gap:2px;padding-bottom:8px">
      <dc-import name="AssistantMessageModule"
        assistant="Financial coach"
        status="Reviewed your subscriptions"
        body="I found one subscription you haven't used in a while. Want to cancel StreamMax now? I can also keep an eye on the others."
        hint-size="100%,170px"></dc-import>

      <dc-import name="ChatCanvasModule" variant="confirmation" summary="Cancel StreamMax now?" hint-size="100%,560px"></dc-import>
    </div>

    <!-- slot: chat-box -> ChatBoxModule (context: assistant) {2} -->
    <div style="position:sticky;bottom:0;background:linear-gradient(to top,#F4F4F1 70%,rgba(244,244,241,0));padding-top:4px">
      <dc-import name="ChatBoxModule" context="assistant" placeholder="Message your Financial coach" hint-size="100%,92px"></dc-import>
    </div>

  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 440, &quot;height&quot;: 900 }
}"></script>
</body>
</html>
