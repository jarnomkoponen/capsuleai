<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { margin: 0; }
  .hm-scroll::-webkit-scrollbar { width: 0; }
.cap-fakestatus{display:none !important;}
  .cap-stage{min-height:100dvh !important;padding:0 !important;align-items:stretch !important;}
  .cap-phone{width:100% !important;max-width:480px !important;height:100vh !important;height:100dvh !important;border-radius:0 !important;border:none !important;padding-top:env(safe-area-inset-top,0) !important;}
</style><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
</helmet>
<div class="cap-stage" style="min-height:100vh;background:#ECECEE;display:flex;align-items:center;justify-content:center;padding:24px 12px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI',system-ui,sans-serif;">
  <div class="cap-phone" style="width:390px;max-width:100%;height:812px;background:#FFFFFF;border-radius:44px;border:1px solid #D9D9DD;overflow:hidden;display:flex;flex-direction:column;">
    <div class="cap-fakestatus" style="display:flex;align-items:center;justify-content:space-between;padding:12px 26px 4px;flex:none;">
      <span style="font-size:15px;font-weight:600;color:#17171A;">9:41</span>
      <span aria-hidden="true" style="display:flex;gap:6px;align-items:center;"><svg width="18" height="12" viewBox="0 0 18 12" fill="#17171A"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg><svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 10.4a1.15 1.15 0 100-2.3 1.15 1.15 0 000 2.3z" fill="#17171A"/><path d="M3.6 6.4a6.2 6.2 0 018.8 0M1.2 4a9.7 9.7 0 0113.6 0" stroke="#17171A" stroke-width="1.4" stroke-linecap="round"/></svg><svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="0.6" y="0.6" width="22" height="11.8" rx="3" stroke="#17171A" stroke-width="1.2"/><rect x="2.6" y="2.6" width="14.5" height="7.8" rx="1.5" fill="#17171A"/><path d="M24.4 4.3c1 .5 1 3.9 0 4.4" stroke="#17171A" stroke-width="1.4" stroke-linecap="round"/></svg></span>
    </div>
    <dc-import name="TopNavModule" variant="home" title="Home" unread="2" on-bell="{{ onBell }}" on-chat="{{ onChat }}" hint-size="100%,60px"></dc-import>
    <main role="main" class="hm-scroll" style="flex:1;min-height:0;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px;">
      <sc-for list="{{ moments }}" as="m" hint-placeholder-count="4">
        <dc-import name="MomentModule" assistant="{{ m.assistant }}" topic="{{ m.topic }}" efficiency="{{ m.efficiency }}" state="{{ m.state }}" viz-kind="{{ m.vizKind }}" summary="{{ m.summary }}" caption="{{ m.caption }}" on-start-chat="{{ onStartChat }}" hint-size="100%,460px"></dc-import>
      </sc-for>

      <div style="height:1px;background:#ECECEE;margin:4px 0;"></div>
      <dc-import name="AgentActivityLogModule" scope="all" hint-size="100%,420px"></dc-import>
    </main>
    <dc-import name="BottomNavModule" current="Home" on-navigate="{{ onNav }}" hint-size="100%,88px"></dc-import>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:880}}">class Component extends DCLogic {
  momentData() {
    return {
      'Home helper': { topic: 'Home', efficiency: 55, state: 'max', vizKind: 'bars', summary: "Sorted Thursday for you. Dinner shifted to recovery-friendly food, groceries adjusted, and the interval session swapped with Friday's run so football pickup no longer clashes.", caption: "This week's home coordination at a glance" },
      'Health coach': { topic: 'Health', efficiency: 95, state: 'max', vizKind: 'trend', summary: "Your recovery is on track. Efficiency is maxed \u2014 I'll let you know if anything else can help.", caption: 'Recovery trending up over the last six weeks' },
      'Training buddy': { topic: 'Training', efficiency: 70, state: 'default', vizKind: 'bars', summary: "Your program is building up. I proposed two gym slots that fit both your and Marko's calendars \u2014 your health context stays private to you.", caption: 'Shared sessions this week' },
      'Companion': { topic: 'Relationships', efficiency: 40, state: 'has-nudge', vizKind: 'rings', summary: "Held space for you to think it through. Share only what you choose, with whom you choose \u2014 and close it again when you're done.", caption: 'Your reflections stay yours' },
      'Career coach': { topic: 'Career', efficiency: 45, state: 'default', vizKind: 'bars', summary: 'Mapped your next move. I set three goals for the year and spotted two openings worth a look \u2014 want to review them?', caption: 'Your growth this quarter' },
      'Financial coach': { topic: 'Finance', efficiency: 60, state: 'default', vizKind: 'bars', summary: 'Found two leaks to plug. A streaming service untouched for two months, and a learning plan overlapping a cheaper one \u2014 want me to fix them?', caption: 'Subscriptions that no longer fit' },
    };
  }
  topicAssistants() {
    return { family: ['Home helper'], health: ['Health coach', 'Training buddy'], relationships: ['Companion'], career: ['Career coach'], finance: ['Financial coach'], recovery: ['Health coach', 'Home helper'] };
  }
  readList(key) { try { return JSON.parse(window.localStorage.getItem(key) || '[]'); } catch (e) { return []; } }
  activeNames() {
    const map = this.topicAssistants();
    const chosen = [];
    this.readList('capsule.helpTopics').forEach((t) => (map[t] || []).forEach((n) => { if (!chosen.includes(n)) chosen.push(n); }));
    const set = chosen.concat(this.readList('capsule.addedAssistants'));
    const order = ['Home helper', 'Health coach', 'Training buddy', 'Companion', 'Career coach', 'Financial coach'];
    const active = order.filter((n) => set.includes(n));
    return active.length ? active : order;
  }
  renderVals() {
    const data = this.momentData();
    const moments = this.activeNames().map((n) => Object.assign({ assistant: n }, data[n]));
    return {
      moments,
      onStartChat: this.props.onStartChat || (() => {}),
      onBell: this.props.onBell || (() => {}),
      onChat: this.props.onChat || (() => {}),
      onNav: this.props.onNav || (() => {}),
    };
  }
}</script>
</body>
</html>
