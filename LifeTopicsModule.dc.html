<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
*{box-sizing:border-box}html,body{margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",system-ui,sans-serif;background:#EAEAE6;color:#1A1A1A;-webkit-font-smoothing:antialiased}
</style>
</helmet>
<div style="max-width:460px;margin:0 auto;padding:16px">
  <section aria-label="My life topics">
    <div style="font-size:13px;font-weight:600;color:#454541;margin:0 0 10px">My life</div>

    <!-- HOME VARIANT: large status cards -->
    <sc-if value="{{ isHome }}" hint-placeholder-val="{{ false }}">
      <div role="list" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <sc-for list="{{ topics }}" as="t" hint-placeholder-count="4">
          <button role="listitem" onClick="{{ t.action }}" aria-label="{{ t.aria }}" style="text-align:left;background:#FFFFFF;border:1px solid #E4E3DF;border-radius:16px;padding:14px;cursor:pointer;font-family:inherit;min-height:96px;display:flex;flex-direction:column;gap:8px" style-hover="border-color:#2E5AAC;background:#F7F9FD">
            <span aria-hidden="true" style="width:34px;height:34px;border-radius:10px;background:{{ t.tint }};color:{{ t.ink }};display:flex;align-items:center;justify-content:center"><span dangerouslySetInnerHTML="{{ t.icon }}"></span></span>
            <span style="display:block"><span style="display:block;font-size:17px;line-height:22px;font-weight:600;color:#1A1A1A">{{ t.label }}</span><span style="display:block;font-size:14px;line-height:19px;color:#454541">{{ t.status }}</span></span>
          </button>
        </sc-for>
      </div>
    </sc-if>

    <!-- YOU-VIEW VARIANT: compact management chips -->
    <sc-if value="{{ isYou }}" hint-placeholder-val="{{ true }}">
      <div role="list" style="display:flex;flex-wrap:wrap;gap:8px">
        <sc-for list="{{ topics }}" as="t" hint-placeholder-count="5">
          <button role="listitem" onClick="{{ t.action }}" aria-label="{{ t.aria }}" style="display:flex;align-items:center;gap:8px;min-height:44px;padding:8px 14px 8px 10px;background:#FFFFFF;border:1px solid #E4E3DF;border-radius:22px;cursor:pointer;font-family:inherit" style-hover="border-color:#2E5AAC;background:#F7F9FD">
            <span aria-hidden="true" style="width:26px;height:26px;border-radius:50%;background:{{ t.tint }};color:{{ t.ink }};display:flex;align-items:center;justify-content:center"><span dangerouslySetInnerHTML="{{ t.iconSm }}"></span></span>
            <span style="font-size:16px;line-height:20px;font-weight:600;color:#1A1A1A">{{ t.label }}</span>
            <sc-if value="{{ t.hasStatus }}" hint-placeholder-val="{{ false }}"><span style="font-size:13px;line-height:17px;color:#6E6A62">· {{ t.status }}</span></sc-if>
          </button>
        </sc-for>
        <button onClick="{{ addAction }}" aria-label="Add a life topic" style="display:flex;align-items:center;gap:6px;min-height:44px;padding:8px 16px;background:transparent;border:1.5px dashed #C7C7C1;border-radius:22px;cursor:pointer;font-family:inherit;color:#2E5AAC;font-size:16px;font-weight:600" style-hover="border-color:#2E5AAC;background:#F7F9FD">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
          Add
        </button>
      </div>
    </sc-if>

    <sc-if value="{{ homeAdd }}" hint-placeholder-val="{{ false }}">
      <button onClick="{{ addAction }}" aria-label="Add a life topic" style="margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;min-height:52px;background:transparent;border:1.5px dashed #C7C7C1;border-radius:16px;cursor:pointer;font-family:inherit;color:#2E5AAC;font-size:16px;font-weight:600">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
        Add a topic
      </button>
    </sc-if>
  </section>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 492, &quot;height&quot;: 220 },
  &quot;variant&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;you-view&quot;,&quot;home&quot;], &quot;default&quot;: &quot;you-view&quot;, &quot;tsType&quot;: &quot;'home'|'you-view'&quot; },
  &quot;topics&quot;: { &quot;editor&quot;: null, &quot;default&quot;: [{&quot;id&quot;:&quot;home&quot;,&quot;label&quot;:&quot;Home&quot;,&quot;status&quot;:&quot;2 tasks today&quot;,&quot;icon&quot;:&quot;home&quot;},{&quot;id&quot;:&quot;health&quot;,&quot;label&quot;:&quot;Health&quot;,&quot;status&quot;:&quot;recovery progress&quot;,&quot;icon&quot;:&quot;health&quot;},{&quot;id&quot;:&quot;family&quot;,&quot;label&quot;:&quot;Family &amp; Friends&quot;,&quot;status&quot;:&quot;week coordinated&quot;,&quot;icon&quot;:&quot;family&quot;},{&quot;id&quot;:&quot;money&quot;,&quot;label&quot;:&quot;Money&quot;,&quot;status&quot;:&quot;1 review&quot;,&quot;icon&quot;:&quot;money&quot;},{&quot;id&quot;:&quot;work&quot;,&quot;label&quot;:&quot;Work&quot;,&quot;status&quot;:&quot;&quot;,&quot;icon&quot;:&quot;work&quot;}], &quot;tsType&quot;: &quot;{ id: string; label: string; status?: string; icon?: string; action: Action }[]&quot; }
}">
class Component extends DCLogic {
  ic(name,sm){
    const s = sm ? 15 : 19;
    const p = {
      home:'<path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/>',
      health:'<path d="M12 21s-7-4.5-9.5-9A5 5 0 0 1 12 6a5 5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z"/>',
      family:'<circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0 1 12 0"/><path d="M16 5a3 3 0 0 1 0 6"/>',
      money:'<circle cx="12" cy="12" r="9"/><path d="M12 7v10"/><path d="M9.5 9.5a2.5 2.5 0 0 1 5 0c0 2.5-5 1.5-5 4a2.5 2.5 0 0 0 5 0"/>',
      work:'<rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
    };
    return { __html:'<svg width="'+s+'" height="'+s+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(p[name]||p.home)+'</svg>' };
  }
  renderVals(){
    const variant = this.props.variant ?? 'you-view';
    const tints = { home:['#EAF0FA','#2E5AAC'], health:['#F0ECF6','#4B2E83'], family:['#E8F0EC','#1E7A46'], money:['#FBF1E6','#8A5A00'], work:['#EFECF7','#4B2E83'] };
    const def = [
      { id:'home', label:'Home', status:'2 tasks today', icon:'home' },
      { id:'health', label:'Health', status:'recovery progress', icon:'health' },
      { id:'family', label:'Family & Friends', status:'week coordinated', icon:'family' },
      { id:'money', label:'Money', status:'1 review', icon:'money' },
      { id:'work', label:'Work', status:'', icon:'work' },
    ];
    const raw = Array.isArray(this.props.topics) && this.props.topics.length ? this.props.topics : def;
    const noop = () => {};
    const topics = raw.map(t => {
      const tint = tints[t.icon] || ['#EEEDEA','#454541'];
      return {
        label:t.label, status:t.status || '', hasStatus:!!t.status,
        icon:this.ic(t.icon,false), iconSm:this.ic(t.icon,true),
        tint:tint[0], ink:tint[1],
        aria: t.label + (t.status ? (', ' + t.status) : ''),
        action:t.action || noop,
      };
    });
    return {
      topics,
      isHome: variant === 'home', isYou: variant === 'you-view',
      homeAdd: variant === 'home',
      addAction: this.props.addAction || noop,
    };
  }
}
</script>
</body>
</html>
