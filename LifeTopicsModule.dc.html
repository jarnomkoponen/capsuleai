<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { margin: 0; }
  .lt-card:focus-visible, .lt-chip:focus-visible, .lt-add:focus-visible { outline: 2px solid #0F766E; outline-offset: 2px; }
</style>
</helmet>
<section aria-label="My life topics" style="font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI',system-ui,sans-serif;">
  <h2 style="margin:0 0 12px;font-size:15px;line-height:20px;font-weight:700;color:#17171A;">My life</h2>

  <!-- home variant: status cards -->
  <sc-if value="{{ isHome }}" hint-placeholder-val="{{ true }}">
    <ul style="list-style:none;margin:0;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <sc-for list="{{ topics }}" as="t" hint-placeholder-count="4">
        <li>
          <button type="button" class="lt-card" onClick="{{ t.action }}" aria-label="{{ t.aria }}" style="width:100%;height:100%;text-align:left;display:flex;flex-direction:column;gap:6px;min-height:76px;padding:14px;border:1px solid #D9D9DD;border-radius:14px;background:#FFFFFF;cursor:pointer;">
            <span style="font-size:16px;line-height:21px;font-weight:600;color:#17171A;">{{ t.label }}</span>
            <sc-if value="{{ t.hasStatus }}" hint-placeholder-val="{{ true }}">
              <span style="font-size:13px;line-height:18px;color:#6E6E77;">{{ t.status }}</span>
            </sc-if>
          </button>
        </li>
      </sc-for>
    </ul>
  </sc-if>

  <!-- you-view: compact chips -->
  <sc-if value="{{ isChips }}" hint-placeholder-val="{{ false }}">
    <div style="display:flex;flex-wrap:wrap;gap:8px;">
      <sc-for list="{{ topics }}" as="t" hint-placeholder-count="4">
        <button type="button" class="lt-chip" onClick="{{ t.action }}" aria-label="{{ t.aria }}" style="display:inline-flex;align-items:center;min-height:40px;padding:0 16px;border:1px solid #D9D9DD;border-radius:20px;background:#FFFFFF;color:#17171A;font:500 15px/1 inherit;cursor:pointer;">{{ t.label }}</button>
      </sc-for>
      <button type="button" class="lt-add" onClick="{{ onAdd }}" aria-label="Add a life topic" style="display:inline-flex;align-items:center;gap:6px;min-height:40px;padding:0 16px;border:1px dashed #B8B8BF;border-radius:20px;background:#FFFFFF;color:#0F766E;font:600 15px/1 inherit;cursor:pointer;"><span aria-hidden="true" style="font-size:18px;line-height:1;">+</span> Add</button>
    </div>
  </sc-if>

  <sc-if value="{{ isHome }}" hint-placeholder-val="{{ true }}">
    <button type="button" class="lt-add" onClick="{{ onAdd }}" aria-label="Add a life topic" style="display:inline-flex;align-items:center;gap:6px;margin-top:12px;min-height:44px;padding:0 16px;border:1px dashed #B8B8BF;border-radius:12px;background:#FFFFFF;color:#0F766E;font:600 15px/1 inherit;cursor:pointer;"><span aria-hidden="true" style="font-size:18px;line-height:1;">+</span> Add a topic</button>
  </sc-if>
</section>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:260},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;home&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;you-view&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const variant = this.props.variant || 'home';
    const raw = this.props.topics || [
      { id: 'home', label: 'Home', status: 'Dinner plan updated' },
      { id: 'health', label: 'Health', status: 'Recovery on track' },
      { id: 'family', label: 'Family & Friends', status: 'School chat prepped' },
      { id: 'finance', label: 'Finance', status: '1 subscription flagged' },
    ];
    const onOpen = this.props.onOpen || (() => {});
    const topics = raw.map((t) => ({
      label: t.label, status: t.status, hasStatus: !!t.status,
      aria: t.label + (t.status ? ', ' + t.status : ''),
      action: () => onOpen(t),
    }));
    return {
      topics,
      isHome: variant === 'home',
      isChips: variant === 'you-view',
      onAdd: this.props.onAdd || (() => {}),
    };
  }
}
</script>
</body>
</html>
