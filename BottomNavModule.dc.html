<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
*{box-sizing:border-box}html,body{margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",system-ui,sans-serif;background:#EAEAE6;color:#1A1A1A;-webkit-font-smoothing:antialiased}
</style>
</helmet>
<div style="max-width:460px;margin:0 auto;padding:16px">
  <nav aria-label="Primary" role="tablist" style="display:flex;background:#FFFFFF;border:1px solid #E4E3DF;border-radius:18px;padding:6px;gap:4px">
    <sc-for list="{{ items }}" as="it" hint-placeholder-count="3">
      <button role="tab" aria-current="{{ it.ariaCurrent }}" aria-label="{{ it.label }}" onClick="{{ it.action }}" style="flex:1;min-height:56px;border:none;background:{{ it.bg }};border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:{{ it.color }};font-family:inherit">
        <span style="display:flex" dangerouslySetInnerHTML="{{ it.icon }}"></span>
        <span style="font-size:12px;line-height:14px;font-weight:{{ it.weight }}">{{ it.label }}</span>
      </button>
    </sc-for>
  </nav>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 492, &quot;height&quot;: 100 },
  &quot;currentIndex&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 0, &quot;min&quot;: 0, &quot;max&quot;: 2, &quot;tsType&quot;: &quot;number&quot; },
  &quot;items&quot;: { &quot;editor&quot;: null, &quot;default&quot;: [{&quot;label&quot;: &quot;Home&quot;, &quot;icon&quot;: &quot;home&quot;}, {&quot;label&quot;: &quot;Assistants&quot;, &quot;icon&quot;: &quot;assistants&quot;}, {&quot;label&quot;: &quot;You&quot;, &quot;icon&quot;: &quot;you&quot;}], &quot;tsType&quot;: &quot;{ label: string; icon: string; current?: boolean }[]&quot; }
}">
class Component extends DCLogic {
  icon(name, color) {
    const p = {
      home: '<path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/>',
      assistants: '<circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0 1 12 0"/><path d="M16 5a3 3 0 0 1 0 6"/><path d="M18 20a6 6 0 0 0-3-5.2"/>',
      you: '<circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/>',
    };
    return { __html: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="' + color + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + (p[name] || p.home) + '</svg>' };
  }
  renderVals() {
    const def = [
      { label: 'Home', icon: 'home' },
      { label: 'Assistants', icon: 'assistants' },
      { label: 'You', icon: 'you' },
    ];
    const raw = Array.isArray(this.props.items) && this.props.items.length ? this.props.items : def;
    const current = this.props.currentIndex ?? 0;
    const noop = () => {};
    const items = raw.map((it, i) => {
      const active = it.current != null ? it.current : (i === current);
      const color = active ? '#2E5AAC' : '#5C5C5C';
      return {
        label: it.label,
        icon: this.icon(it.icon || 'home', color),
        color, weight: active ? 700 : 500,
        bg: active ? '#EAF0FA' : 'transparent',
        ariaCurrent: active ? 'page' : undefined,
        action: it.action || noop,
      };
    });
    return { items };
  }
}
</script>
</body>
</html>
