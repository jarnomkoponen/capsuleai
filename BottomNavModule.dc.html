<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { margin: 0; }
  .bn-tab:focus-visible { outline: 2px solid #0F766E; outline-offset: -2px; }
</style>
</helmet>
<nav role="tablist" aria-label="Sections" style="font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI',system-ui,sans-serif;background:transparent;display:flex;justify-content:center;padding:8px 16px calc(16px + env(safe-area-inset-bottom,0));pointer-events:none;">
  <div style="display:flex;gap:4px;background:rgba(255,255,255,0.82);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border:1px solid #D9D9DD;border-radius:30px;padding:6px;box-shadow:0 6px 24px rgba(23,23,26,0.10);pointer-events:auto;">
  <sc-for list="{{ items }}" as="it" hint-placeholder-count="3">
    <button type="button" role="tab" class="bn-tab" aria-selected="{{ it.selected }}" aria-current="{{ it.current }}" onClick="{{ it.onSelect }}" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-width:72px;min-height:48px;border:none;border-radius:22px;background:{{ it.pillBg }};cursor:pointer;padding:4px 14px;color:{{ it.color }};">
      <span aria-hidden="true" style="display:inline-flex;" data-icon="{{ it.icon }}">
        <sc-if value="{{ it.isHome }}" hint-placeholder-val="{{ true }}">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M4 11l8-6 8 6M6 10v9h12v-9" stroke="{{ it.color }}" stroke-width="{{ it.stroke }}" stroke-linejoin="round" stroke-linecap="round"/></svg>
        </sc-if>
        <sc-if value="{{ it.isAssistants }}" hint-placeholder-val="{{ false }}">
          <span style="font-size:22px;line-height:26px;font-weight:600;letter-spacing:-0.03em;color:{{ it.color }};">(o)</span>
        </sc-if>
        <sc-if value="{{ it.isYou }}" hint-placeholder-val="{{ false }}">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.4" stroke="{{ it.color }}" stroke-width="{{ it.stroke }}"/><path d="M5.5 20a6.5 6.5 0 0113 0" stroke="{{ it.color }}" stroke-width="{{ it.stroke }}" stroke-linecap="round"/></svg>
        </sc-if>
      </span>
      <span style="font-size:11px;line-height:13px;font-weight:{{ it.weight }};color:{{ it.color }};letter-spacing:0.01em;">{{ it.label }}</span>
    </button>
  </sc-for>
  </div>
</nav>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:88},&quot;current&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Home&quot;,&quot;options&quot;:[&quot;Home&quot;,&quot;Assistants&quot;,&quot;You&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#0F766E&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#0F766E&quot;,&quot;#2563C9&quot;,&quot;#C2410C&quot;]}}">
class Component extends DCLogic {
  renderVals() {
    const accent = this.props.accent || '#0F766E';
    const current = this.props.current || 'Home';
    const base = this.props.items || [
      { label: 'Home', icon: 'home' },
      { label: 'Assistants', icon: 'assistants' },
      { label: 'You', icon: 'you' },
    ];
    const onNavigate = this.props.onNavigate || (() => {});
    const items = base.map((it) => {
      const isCurrent = (it.current != null) ? it.current : (it.label === current);
      return {
        label: it.label, icon: it.icon,
        isHome: it.icon === 'home', isAssistants: it.icon === 'assistants', isYou: it.icon === 'you',
        selected: isCurrent ? 'true' : 'false',
        current: isCurrent ? 'page' : 'false',
        color: isCurrent ? accent : '#6E6E77',
        pillBg: isCurrent ? '#F0F3F2' : 'transparent',
        weight: isCurrent ? 600 : 400,
        stroke: isCurrent ? 2.2 : 1.7,
        onSelect: () => onNavigate(it.label),
      };
    });
    return { items };
  }
}
</script>
</body>
</html>
