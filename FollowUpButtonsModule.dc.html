<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { margin: 0; }
  .fu-btn:focus-visible { outline: 2px solid #0F766E; outline-offset: 2px; }
</style>
</helmet>
<div role="group" aria-label="Suggested replies" style="font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI',system-ui,sans-serif;display:flex;flex-wrap:wrap;gap:8px;">
  <sc-for list="{{ prompts }}" as="p" hint-placeholder-count="3">
    <button type="button" class="fu-btn" onClick="{{ p.action }}" style="appearance:none;border:none;background:#17171A;color:#FFFFFF;font:600 15px/1.3 inherit;min-height:44px;padding:10px 18px;border-radius:22px;cursor:pointer;text-align:left;max-width:100%;">{{ p.label }}</button>
  </sc-for>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:120}}">
class Component extends DCLogic {
  renderVals() {
    const raw = this.props.prompts || [
      { id: 'a', label: 'Tell me more' },
      { id: 'b', label: 'Hold the Thursday slot' },
      { id: 'c', label: 'Not now' },
    ];
    const onPrompt = this.props.onPrompt || (() => {});
    return { prompts: raw.map((p) => ({ label: p.label, action: () => onPrompt(p) })) };
  }
}
</script>
</body>
</html>
