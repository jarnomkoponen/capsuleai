<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { margin: 0; }
  .pm-task:focus-visible { outline: 2px solid #0F766E; outline-offset: 2px; }
</style>
</helmet>
<section aria-label="Your progress" style="font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI',system-ui,sans-serif;">
  <h2 style="margin:0 0 16px;font-size:15px;line-height:20px;font-weight:700;color:#17171A;">Your progress</h2>
  <ol style="list-style:none;margin:0;padding:0;">
    <sc-for list="{{ milestones }}" as="m" hint-placeholder-count="4">
      <li style="display:flex;gap:14px;">
        <!-- rail -->
        <div style="display:flex;flex-direction:column;align-items:center;flex:none;width:26px;">
          <span aria-hidden="true" style="width:24px;height:24px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;{{ m.dotStyle }}">{{ m.glyph }}</span>
          <sc-if value="{{ m.showLine }}" hint-placeholder-val="{{ true }}">
            <span aria-hidden="true" style="width:2px;flex:1;min-height:34px;background:{{ m.lineColor }};"></span>
          </sc-if>
        </div>
        <!-- text -->
        <div style="padding-bottom:20px;flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:16px;line-height:21px;font-weight:{{ m.weight }};color:#17171A;">{{ m.label }}</span>
            <span style="font-size:11px;line-height:15px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:{{ m.tagColor }};">{{ m.stateLabel }}</span>
          </div>
          <sc-if value="{{ m.hasDesc }}" hint-placeholder-val="{{ true }}">
            <p style="margin:3px 0 0;font-size:14px;line-height:20px;color:#6E6E77;">{{ m.description }}</p>
          </sc-if>
        </div>
      </li>
    </sc-for>
  </ol>

  <sc-if value="{{ hasTasks }}" hint-placeholder-val="{{ false }}">
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:4px;">
      <sc-for list="{{ tasks }}" as="t" hint-placeholder-count="3">
        <button type="button" class="pm-task" onClick="{{ t.action }}" style="appearance:none;border:1px solid #17171A;background:#FFFFFF;color:#17171A;font:500 15px/1 inherit;min-height:44px;padding:0 18px;border-radius:22px;cursor:pointer;">{{ t.label }}</button>
      </sc-for>
    </div>
  </sc-if>
</section>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:420},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#0F766E&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#0F766E&quot;,&quot;#2563C9&quot;,&quot;#C2410C&quot;]}}">
class Component extends DCLogic {
  renderVals() {
    const accent = this.props.accent || '#0F766E';
    const raw = this.props.milestones || [
      { id: 'm1', label: 'Milestone 1', description: 'Assessment complete', state: 'done' },
      { id: 'm2', label: 'Milestone 2', description: 'First week of the plan', state: 'done' },
      { id: 'm3', label: 'Milestone 3', description: 'Building consistency', state: 'current' },
      { id: 'm4', label: 'Milestone 4', description: 'Sustained recovery', state: 'upcoming' },
    ];
    const n = raw.length;
    const milestones = raw.map((m, i) => {
      const done = m.state === 'done', current = m.state === 'current';
      let dotStyle, glyph = '', stateLabel, tagColor;
      if (done) { dotStyle = 'background:#17171A;border:2px solid #17171A;color:#FFFFFF;font-size:13px;font-weight:800;'; glyph = '✓'; stateLabel = 'Done'; tagColor = '#6E6E77'; }
      else if (current) { dotStyle = 'background:#FFFFFF;border:3px solid ' + accent + ';'; stateLabel = 'In progress'; tagColor = accent; }
      else { dotStyle = 'background:#FFFFFF;border:2px solid #D9D9DD;'; stateLabel = 'Upcoming'; tagColor = '#B8B8BF'; }
      return {
        label: m.label, description: m.description, hasDesc: !!m.description,
        dotStyle, glyph, stateLabel, tagColor,
        weight: current ? 700 : (done ? 600 : 500),
        showLine: i < n - 1,
        lineColor: done ? '#17171A' : '#D9D9DD',
      };
    });
    const rawTasks = this.props.tasks || [{ label: 'Task 1' }, { label: 'Task 2' }, { label: 'Task 3' }];
    const onTask = this.props.onTask || (() => {});
    const tasks = rawTasks.map((t) => ({ label: t.label, action: () => onTask(t) }));
    return { milestones, tasks, hasTasks: tasks.length > 0 };
  }
}
</script>
</body>
</html>
